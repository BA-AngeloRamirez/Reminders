<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Reminders // Executive Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #09090b;       /* Deep obsidian/graphite black */
            --card-bg: #121214;      /* Smooth solid dark surface */
            --panel-bg: #18181b;     /* Refined elevation surface */
            --border-color: #222226;  /* High-precision micro borders */
            --text-primary: #f4f4f5;   /* Crisp platinum white */
            --text-muted: #a1a1aa;     /* Refined slate grey */
            --accent-pure: #ffffff;   /* Minimalist stark luxury accent */
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Clean Executive Header */
        .header {
            margin-bottom: 45px;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 400;
            margin: 0;
        }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 10px;
            letter-spacing: 0.25em;
        }

        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .search-container {
            flex-grow: 1;
            position: relative;
            max-width: 500px;
        }

        .search-container input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-family: var(--font-sans);
            background-color: #18181b;
            color: #ffffff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-container input::placeholder {
            color: #52525b;
        }

        .search-container input:focus {
            border-color: #4b5563;
            background-color: #202024;
        }

        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #52525b;
            font-size: 0.95em;
        }

        .btn-add {
            background-color: var(--accent-pure);
            color: #000000;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add:hover {
            background-color: #e4e4e7;
            transform: translateY(-1px);
        }

        /* Minimalist Architecture Navigation */
        .categories {
            display: flex;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }

        .category-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            transition: all 0.2s ease;
            position: relative;
        }

        .category-btn:hover {
            color: var(--text-primary);
        }

        .category-btn.active {
            color: #ffffff;
            font-weight: 600;
        }

        .category-btn.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--text-primary);
        }

        /* Reminders Architectural Grid */
        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .reminder-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .reminder-card:hover {
            transform: translateY(-4px);
            border-color: #3f3f46;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Card Visual Top Segment (Muted Luxurious Gradients) */
        .card-visual-box {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg-gradient-1 { background: linear-gradient(135deg, #141b17 0%, #090c0a 100%); }
        .bg-gradient-2 { background: linear-gradient(135deg, #18141c 0%, #0b090d 100%); }
        .bg-gradient-3 { background: linear-gradient(135deg, #1c1813 0%, #0d0b09 100%); }
        .bg-gradient-4 { background: linear-gradient(135deg, #13171c 0%, #090b0d 100%); }
        .bg-gradient-5 { background: linear-gradient(135deg, #1c1315 0%, #0d090a 100%); }

        .card-visual-box .big-emoji {
            font-size: 2.5em;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
            opacity: 0.85;
        }

        .card-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 5;
        }

        .icon-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.03);
            color: #71717a;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
        }

        .icon-btn:hover {
            background: var(--text-primary);
            color: #000000;
        }

        .icon-btn.delete-btn:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-body h3 {
            color: #ffffff;
            margin: 0 0 12px 0;
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-body p {
            margin: 0 0 24px 0;
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 0.9rem;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reactions-container {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 5;
        }

        .reaction-pill-btn {
            background: #18181b;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .reaction-pill-btn:hover {
            background: #27272a;
            color: var(--text-primary);
        }

        .reaction-pill-btn.has-count {
            background: rgba(255, 255, 255, 0.06);
            border-color: #71717a;
            color: #ffffff;
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: #18181b;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* High-End Immersive Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 9, 11, 0.85); 
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--panel-bg);
            width: 95%;
            max-width: 500px;
            border-radius: 14px;
            padding: 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            transform: scale(0.96);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .close-modal {
            background: none;
            border: none;
            color: #52525b;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: white;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #121214;
            color: white;
            font-family: var(--font-sans);
            box-sizing: border-box;
            outline: none;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .form-group select option {
            background: var(--panel-bg);
            color: white;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #4b5563;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 35px;
        }

        .btn-cancel {
            background: #121214;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 11px 22px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-cancel:hover {
            background: #18181b;
            color: #ffffff;
        }

        .btn-save {
            background: var(--accent-pure);
            color: #000000;
            border: none;
            padding: 11px 26px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.85rem;
            transition: background-color 0.2s ease;
        }

        .btn-save:hover {
            background-color: #e4e4e7;
        }

        /* Reader View Panel */
        .view-emoji-container {
            font-size: 3em;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .view-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 400;
            color: #ffffff;
            text-align: center;
            margin: 0 0 20px 0;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .view-desc {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.7;
            background: #121214;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 25px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .view-tags-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            display: block;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 60px;
            grid-column: 1 / -1;
            display: none;
        }
        
        input[type="checkbox"] {
            accent-color: #ffffff;
            width: 15px;
            height: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BA Reminders</h1>
            <div class="subtitle" id="currentDate"></div>
            
            <div class="controls-wrapper">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search keywords (e.g. Bonus, Bank Wire)...">
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> New Post
                </button>
            </div>
        </div>

        <div class="categories" id="categoriesContainer"></div>

        <div class="reminders-grid" id="remindersGrid"></div>
        <div class="no-results" id="noResults">No records correspond with your search filters.</div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="postForm" onsubmit="savePost(event)">
                <input type="hidden" id="postId">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="postTitleInput" required placeholder="Enter reminder title...">
                </div>

                <div class="form-group">
                    <label>Assign Icon / Topic</label>
                    <select id="postEmojiInput">
                        <option value="💡">General Info 💡</option>
                        <option value="🎁">Bonuses / Promos 🎁</option>
                        <option value="⚽">Sports / Sportsbooks ⚽</option>
                        <option value="🎰">Casino 🎰</option>
                        <option value="🎟️">Lotto 🎟️</option>
                        <option value="💳">Deposits 💳</option>
                        <option value="💰">Money / Payouts 💰</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Information</label>
                    <textarea id="postDescInput" required placeholder="Enter the details..." style="height: 120px; resize: vertical;"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Categories (Select at least one)</label>
                    <div class="categories-grid" id="checkboxesContainer"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="viewPostModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reminder Details</h2>
                <button class="close-modal" onclick="closeViewModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="view-emoji-container" id="viewPostEmoji">💡</div>
            <h3 class="view-title" id="viewPostTitle">Title Placeholder</h3>
            <div class="view-desc" id="viewPostDesc">Full description details go here...</div>
            
            <span class="view-tags-label">Assigned Categories</span>
            <div class="tags" id="viewPostTags"></div>
            
            <div class="modal-actions">
                <button type="button" class="btn-save" onclick="closeViewModal()">Close View</button>
            </div>
        </div>
    </div>

    <script>
        // Date Setup
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', dateOptions);

        // Baseline Mock Data [cite: 309]
        const defaultReminders = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals. This streamlines processing times significantly for all regional requests.", categories: ["Payouts", "General Info"], emoji: "💰", reactions: { "👍": 2, "🔥": 1, "📌": 0, "👀": 0 } },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more. Make sure the documentation matches perfectly.", categories: ["General Info"], emoji: "💡", reactions: { "👍": 0, "🔥": 0, "📌": 3, "👀": 1 } },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"], emoji: "🎁", reactions: { "👍": 1, "🔥": 4, "📌": 0, "👀": 2 } }
        ];

        let reminders = JSON.parse(localStorage.getItem('ba_reminders')) || defaultReminders;

        const catOptions = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        const allCategoriesTab = ["All", ...catOptions];
        let currentCategory = "All";
        let searchTerm = "";

        const grid = document.getElementById('remindersGrid');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const modal = document.getElementById('postModal');
        const viewModal = document.getElementById('viewPostModal');

        function init() {
            renderTabs();
            renderCheckboxes();
            renderReminders();
        }

        function renderTabs() {
            categoriesContainer.innerHTML = '';
            allCategoriesTab.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderTabs();
                    renderReminders();
                };
                categoriesContainer.appendChild(btn);
            });
        }

        function renderCheckboxes() {
            const container = document.getElementById('checkboxesContainer');
            container.innerHTML = '';
            catOptions.forEach(cat => {
                container.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${cat}" class="cat-checkbox"> ${cat}
                    </label>
                `;
            });
        }

        function getGradientClass(emoji) {
            if (emoji === '⚽') return 'bg-gradient-1';
            if (emoji === '🎰' || emoji === '🎟️') return 'bg-gradient-2';
            if (emoji === '💰') return 'bg-gradient-3';
            if (emoji === '💳' || emoji === '💡') return 'bg-gradient-4';
            if (emoji === '🎁') return 'bg-gradient-5';
            return 'bg-gradient-4';
        }

        function renderReminders() {
            grid.innerHTML = '';
            let filtered = reminders;

            if (currentCategory !== "All") {
                filtered = filtered.filter(item => item.categories.includes(currentCategory));
            }

            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(term) || 
                    item.description.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                [...filtered].reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'reminder-card';
                    
                    card.onclick = (e) => {
                        if (!e.target.closest('.card-actions') && !e.target.closest('.reactions-container')) {
                            openViewModal(item.id);
                        }
                    };
                    
                    const tagsHtml = item.categories.map(cat => `<span class="tag">${cat}</span>`).join('');
                    const postReactions = item.reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                    const itemEmoji = item.emoji || "💡";
                    const gradientClass = getGradientClass(itemEmoji);

                    const userReacted1 = localStorage.getItem(`reacted_${item.id}_👍`) ? 'has-count' : '';
                    const userReacted2 = localStorage.getItem(`reacted_${item.id}_🔥`) ? 'has-count' : '';
                    const userReacted3 = localStorage.getItem(`reacted_${item.id}_📌`) ? 'has-count' : '';
                    const userReacted4 = localStorage.getItem(`reacted_${item.id}_👀`) ? 'has-count' : '';

                    card.innerHTML = `
                        <div class="card-visual-box ${gradientClass}">
                            <div class="card-actions">
                                <button class="icon-btn" onclick="editPost(${item.id}); event.stopPropagation();" title="Edit Post"><i class="fas fa-pen"></i></button>
                                <button class="icon-btn delete-btn" onclick="deletePost(${item.id}); event.stopPropagation();" title="Delete Post"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="big-emoji">${itemEmoji}</div>
                        </div>
                        <div class="card-body">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                            
                            <div class="reactions-container">
                                <button class="reaction-pill-btn ${userReacted1}" onclick="addReaction(${item.id}, '👍'); event.stopPropagation();">
                                    <span>👍</span> <span class="rc-count">${postReactions['👍'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted2}" onclick="addReaction(${item.id}, '🔥'); event.stopPropagation();">
                                    <span>🔥</span> <span class="rc-count">${postReactions['🔥'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted3}" onclick="addReaction(${item.id}, '📌'); event.stopPropagation();">
                                    <span>📌</span> <span class="rc-count">${postReactions['📌'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted4}" onclick="addReaction(${item.id}, '👀'); event.stopPropagation();">
                                    <span>👀</span> <span class="rc-count">${postReactions['👀'] || 0}</span>
                                </button>
                            </div>

                            <div class="tags">${tagsHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function addReaction(id, emojiKey) {
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                if (!reminders[index].reactions) {
                    reminders[index].reactions = { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                }
                
                const trackingKey = `reacted_${id}_${emojiKey}`;
                const userAlreadyReacted = localStorage.getItem(trackingKey);

                if (userAlreadyReacted) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(trackingKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(trackingKey, 'true');
                }
                
                saveData();
                renderReminders();
            }
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderReminders();
        });

        function openModal() {
            document.getElementById('postForm').reset();
            document.getElementById('postId').value = '';
            document.getElementById('postEmojiInput').value = '💡';
            document.getElementById('modalTitle').innerText = "Create New Post";
            
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function openViewModal(id) {
            const post = reminders.find(r => r.id === id);
            if (post) {
                document.getElementById('viewPostEmoji').innerText = post.emoji || '💡';
                document.getElementById('viewPostTitle').innerText = post.title;
                document.getElementById('viewPostDesc').innerText = post.description;
                
                const tagsContainer = document.getElementById('viewPostTags');
                tagsContainer.innerHTML = post.categories.map(cat => `<span class="tag">${cat}</span>`).join('');
                
                viewModal.classList.add('active');
            }
        }

        function closeViewModal() {
            viewModal.classList.remove('active');
        }

        function editPost(id) {
            const post = reminders.find(r => r.id === id);
            if(post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postTitleInput').value = post.title;
                document.getElementById('postDescInput').value = post.description;
                document.getElementById('postEmojiInput').value = post.emoji || '💡';
                document.getElementById('modalTitle').innerText = "Edit Post";
                
                const checkboxes = document.querySelectorAll('.cat-checkbox');
                checkboxes.forEach(cb => {
                    cb.checked = post.categories.includes(cb.value);
                });
                modal.classList.add('active');
            }
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this reminder?")) {
                reminders = reminders.filter(r => r.id !== id);
                ['👍', '🔥', '📌', '👀'].forEach(k => localStorage.removeItem(`reacted_${id}_${k}`));
                saveData();
                renderReminders();
            }
        }

        function savePost(event) {
            event.preventDefault();
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitleInput').value;
            const description = document.getElementById('postDescInput').value;
            const emoji = document.getElementById('postEmojiInput').value;
            
            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCategories = Array.from(checkboxes).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                alert("Please select at least one category.");
                return;
            }

            if (id) {
                const index = reminders.findIndex(r => r.id == id);
                const existingReactions = reminders[index].reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                reminders[index] = { id: parseInt(id), title, description, categories: selectedCategories, emoji, reactions: existingReactions };
            } else {
                const newId = Date.now();
                reminders.push({ 
                    id: newId, 
                    title, 
                    description, 
                    categories: selectedCategories, 
                    emoji, 
                    reactions: { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 } 
                });
            }

            saveData();
            closeModal();
            renderReminders();
        }

        function saveData() {
            localStorage.setItem('ba_reminders', JSON.stringify(reminders));
        }

        init();
    </script>
</body>
</html>
