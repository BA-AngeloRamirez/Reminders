<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Reminders</title>
    <!-- Fuente moderna Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-purple: #60328a;
            --card-purple: #4e2672;
            --accent-green: #b7f6a3;
            --accent-yellow: #fdf294;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #3a1a5a 0%, var(--bg-purple) 100%);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header Moderno */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--glass-bg);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: var(--accent-yellow);
            font-size: 3.5em;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .header .subtitle {
            color: var(--accent-green);
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .search-container {
            flex-grow: 1;
            position: relative;
            max-width: 600px;
        }

        .search-container input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 50px;
            border: 2px solid transparent;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            background-color: rgba(255, 255, 255, 0.15);
            color: var(--text-white);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            background-color: rgba(255, 255, 255, 0.25);
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(183, 246, 163, 0.3);
        }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-yellow);
            font-size: 1.2em;
        }

        .btn-add {
            background: linear-gradient(45deg, var(--accent-green), #8ee075);
            color: #1a0a2a;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(183, 246, 163, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 20px rgba(183, 246, 163, 0.6);
        }

        /* Pestañas de Categorías (Pills) */
        .categories {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
        }

        .category-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            border: 1px solid var(--glass-border);
            padding: 10px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-btn:hover {
            background-color: rgba(183, 246, 163, 0.2);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background-color: var(--accent-yellow);
            color: #2a1140;
            border-color: var(--accent-yellow);
            box-shadow: 0 4px 15px rgba(253, 242, 148, 0.3);
        }

        /* Grid de Recordatorios */
        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .reminder-card {
            background: var(--card-purple);
            border-radius: 24px;
            padding: 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .reminder-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(183, 246, 163, 0.3);
        }

        .card-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-white);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-btn:hover {
            background: var(--accent-yellow);
            color: var(--bg-purple);
        }

        .icon-btn.delete-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .reminder-content h3 {
            color: var(--accent-yellow);
            margin: 0 0 15px 0;
            font-size: 1.4em;
            padding-right: 80px; /* Espacio para los botones */
            line-height: 1.3;
        }

        .reminder-content p {
            margin: 0 0 20px 0;
            line-height: 1.6;
            color: #d4c4e2;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 0.8em;
            font-weight: 600;
            background-color: rgba(183, 246, 163, 0.15);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
        }

        /* Modal (Popup para crear/editar) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #4e2672;
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            border: 1px solid var(--accent-green);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin: 0;
            color: var(--accent-yellow);
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--accent-green);
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .btn-save {
            background: var(--accent-green);
            color: #1a0a2a;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            color: var(--accent-yellow);
            font-size: 1.2em;
            margin-top: 40px;
            grid-column: 1 / -1;
            display: none;
        }
        
        /* Ocultar el input nativo del checkbox para estilizarlo */
        input[type="checkbox"] {
            accent-color: var(--accent-green);
            width: 18px;
            height: 18px;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BA Reminders</h1>
            <div class="subtitle" id="currentDate"></div>
            
            <div class="controls-wrapper">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search keywords (e.g. Bonus, Bank Wire)...">
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> New Post
                </button>
            </div>
        </div>

        <div class="categories" id="categoriesContainer">
            <!-- Botones JS -->
        </div>

        <div class="reminders-grid" id="remindersGrid">
            <!-- Tarjetas JS -->
        </div>
        <div class="no-results" id="noResults">Oops! No reminders found.</div>
    </div>

    <!-- Modal para Crear / Editar -->
    <div class="modal-overlay" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="postForm" onsubmit="savePost(event)">
                <input type="hidden" id="postId">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="postTitleInput" required placeholder="Enter reminder title...">
                </div>
                
                <div class="form-group">
                    <label>Information</label>
                    <textarea id="postDescInput" required placeholder="Enter the details..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Categories (Select at least one)</label>
                    <div class="categories-grid" id="checkboxesContainer">
                        <!-- Checkboxes generados por JS -->
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Fecha del día dinámica (Opcional, pero le da un toque vivo)
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', dateOptions);

        // Datos iniciales por defecto (si no hay nada guardado en el navegador)
        const defaultReminders = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals.", categories: ["Payouts", "General Info"] },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more.", categories: ["General Info"] },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"] }
        ];

        // Cargar datos de LocalStorage o usar los por defecto
        let reminders = JSON.parse(localStorage.getItem('ba_reminders')) || defaultReminders;

        const catOptions = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        const allCategoriesTab = ["All", ...catOptions];
        
        let currentCategory = "All";
        let searchTerm = "";

        const grid = document.getElementById('remindersGrid');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const modal = document.getElementById('postModal');

        // === INICIALIZACIÓN ===
        function init() {
            renderTabs();
            renderCheckboxes();
            renderReminders();
        }

        // === RENDERIZAR PESTAÑAS PRINCIPALES ===
        function renderTabs() {
            categoriesContainer.innerHTML = '';
            allCategoriesTab.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderTabs();
                    renderReminders();
                };
                categoriesContainer.appendChild(btn);
            });
        }

        // === RENDERIZAR CHECKBOXES DEL MODAL ===
        function renderCheckboxes() {
            const container = document.getElementById('checkboxesContainer');
            container.innerHTML = '';
            catOptions.forEach(cat => {
                container.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${cat}" class="cat-checkbox"> ${cat}
                    </label>
                `;
            });
        }

        // === RENDERIZAR TARJETAS ===
        function renderReminders() {
            grid.innerHTML = '';
            let filtered = reminders;

            if (currentCategory !== "All") {
                filtered = filtered.filter(item => item.categories.includes(currentCategory));
            }

            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(term) || 
                    item.description.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                // Renderizar del más nuevo al más viejo
                [...filtered].reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'reminder-card';
                    
                    const tagsHtml = item.categories.map(cat => `<span class="tag">${cat}</span>`).join('');

                    card.innerHTML = `
                        <div class="card-actions">
                            <button class="icon-btn" onclick="editPost(${item.id})" title="Edit Post"><i class="fas fa-pen"></i></button>
                            <button class="icon-btn delete-btn" onclick="deletePost(${item.id})" title="Delete Post"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="reminder-content">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                            <div class="tags">${tagsHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // === LÓGICA DEL BUSCADOR ===
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderReminders();
        });

        // === LÓGICA DEL MODAL (CREAR Y EDITAR) ===
        function openModal() {
            document.getElementById('postForm').reset();
            document.getElementById('postId').value = '';
            document.getElementById('modalTitle').innerText = "Create New Post";
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function editPost(id) {
            const post = reminders.find(r => r.id === id);
            if(post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postTitleInput').value = post.title;
                document.getElementById('postDescInput').value = post.description;
                document.getElementById('modalTitle').innerText = "Edit Post";
                
                // Marcar checkboxes correspondientes
                const checkboxes = document.querySelectorAll('.cat-checkbox');
                checkboxes.forEach(cb => {
                    cb.checked = post.categories.includes(cb.value);
                });

                modal.classList.add('active');
            }
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this reminder?")) {
                reminders = reminders.filter(r => r.id !== id);
                saveData();
                renderReminders();
            }
        }

        // === GUARDAR DATOS ===
        function savePost(event) {
            event.preventDefault();
            
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitleInput').value;
            const description = document.getElementById('postDescInput').value;
            
            // Recolectar categorías seleccionadas
            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCategories = Array.from(checkboxes).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                alert("Please select at least one category.");
                return;
            }

            if (id) {
                // Actualizar existente
                const index = reminders.findIndex(r => r.id == id);
                reminders[index] = { id: parseInt(id), title, description, categories: selectedCategories };
            } else {
                // Crear nuevo (Generar un ID simple basado en el tiempo)
                const newId = Date.now();
                reminders.push({ id: newId, title, description, categories: selectedCategories });
            }

            saveData();
            closeModal();
            renderReminders();
        }

        // Guardar el array actual en el navegador
        function saveData() {
            localStorage.setItem('ba_reminders', JSON.stringify(reminders));
        }

        // Arrancar
        init();
    </script>
</body>
</html>
