<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Reminders // MISSION CONTROL</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Poppins:wght@400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --space-black: #06080f;
            --deep-void: #0a0d1a;
            --nebula-blue: #00a2ff;
            --nebula-purple: #7000ff;
            --border-dim: rgba(255, 255, 255, 0.08);
            --text-pure: #ffffff;
            --text-stardust: #94a3b8;
            
            /* Paletas de degradados originales mapeadas para las tarjetas */
            --gradient-sports: linear-gradient(135deg, #09472a 0%, #061f14 100%);
            --gradient-casino: linear-gradient(135deg, #2a1140 0%, #150821 100%);
            --gradient-money: linear-gradient(135deg, #5c3c06 0%, #291a02 100%);
            --gradient-general: linear-gradient(135deg, #182a47 0%, #0b1424 100%);
            --gradient-bonus: linear-gradient(135deg, #52112a 0%, #260713 100%);

            --font-brush: 'Permanent Marker', cursive;
            --font-sans: 'Poppins', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--space-black);
            color: var(--text-pure);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* --- BACKGROUND STARS GENERATOR --- */
        .starfield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #111726 0%, #06080f 100%);
        }
        .starfield::after {
            content: "";
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 15vw 25vh 1px #fff, 45vw 12vh 2px #fff, 75vw 60vh 1px #fff, 85vw 30vh 1px #fff, 25vw 80vh 2px #fff, 60vw 90vh 1px #fff, 10vw 55vh 2px #fff, 90vw 85vh 1px #fff, 35vw 40vh 1px #fff;
            opacity: 0.4;
        }

        /* --- CINEMATIC HERO LAYER (STYLE FROM IMAGE) --- */
        .hero-viewport {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .top-left-airplane {
            position: absolute;
            top: 40px; left: 40px;
            font-size: 24px;
            color: var(--text-pure);
            opacity: 0.85;
        }
        .bottom-left-burger {
            position: absolute;
            bottom: 40px; left: 40px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .bottom-left-burger span {
            width: 22px; height: 2px; background: white; display: block;
        }

        .hero-viewport h1 {
            font-family: var(--font-brush);
            font-size: 5.5rem;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: floating-title 4s ease-in-out infinite alternate;
        }
        @keyframes floating-title {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        .hero-viewport p {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-pure);
            margin: 0 0 35px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .btn-cosmic-pill {
            background-color: var(--nebula-blue);
            color: white;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 16px 36px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0, 162, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-decoration: none;
            display: inline-block;
        }
        .btn-cosmic-pill:hover {
            transform: scale(1.05);
            background-color: white;
            color: black;
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.4);
        }

        .scroll-down-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-family: var(--font-sans);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
        .scroll-down-indicator .mouse-node {
            width: 16px; height: 26px;
            border: 2px solid white;
            border-radius: 10px;
            position: relative;
        }
        .scroll-down-indicator .mouse-node::after {
            content: "";
            position: absolute;
            width: 2px; height: 6px;
            background: white;
            left: 50%; top: 4px;
            transform: translateX(-50%);
            animation: scroll-wheel 1.2s infinite;
        }
        @keyframes scroll-wheel {
            0% { top: 4px; opacity: 1; }
            100% { top: 14px; opacity: 0; }
        }

        .planetary-horizon {
            position: absolute;
            bottom: -50px; right: -50px;
            width: 450px; height: 450px;
            background: radial-gradient(circle at 100% 100%, #1e263d 0%, #06080f 70%);
            border-radius: 50%;
            box-shadow: -20px -20px 60px rgba(0, 162, 255, 0.05), inset 10px 10px 30px rgba(255,255,255,0.05);
            z-index: 1;
            pointer-events: none;
        }

        /* --- CONTROL DASHBOARD SECTION --- */
        .dashboard-content-section {
            position: relative;
            z-index: 3;
            max-width: 1350px;
            margin: 0 auto;
            padding: 100px 20px 15px 20px;
            box-sizing: border-box;
        }

        .dashboard-header-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 30px;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .system-title-box h2 {
            font-family: var(--font-brush);
            font-size: 2.5rem;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }
        .system-title-box .subtitle {
            font-family: var(--font-mono);
            color: var(--nebula-blue);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .action-cluster {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .search-engine-pod {
            position: relative;
            width: 340px;
        }
        .search-engine-pod input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-dim);
            border-radius: 50px;
            padding: 14px 25px 14px 50px;
            color: white;
            font-family: var(--font-sans);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-engine-pod input:focus {
            border-color: var(--nebula-blue);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 25px rgba(0, 162, 255, 0.15);
        }
        .search-engine-pod i {
            position: absolute;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-stardust);
        }

        .btn-action-trigger {
            background: white;
            color: black;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .btn-action-trigger:hover {
            background: var(--nebula-blue);
            color: white;
            transform: translateY(-2px);
        }

        /* Category Ribbon Tracks (Tabs) */
        .glass-ribbon {
            display: flex;
            gap: 10px;
            margin-bottom: 45px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .ribbon-cell {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-dim);
            color: var(--text-stardust);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: var(--font-sans);
        }
        .ribbon-cell:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        .ribbon-cell.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* --- REMINDERS GRID SYSTEM --- */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .quantum-card {
            background: rgba(10, 15, 30, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-dim);
            border-radius: 24px;
            overflow: hidden;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .quantum-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Card Visual Graphic Top Box */
        .card-visual-header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-visual-header .big-emoji {
            font-size: 3.2em;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }

        .card-ambient-actions {
            position: absolute;
            top: 15px; right: 15px;
            display: flex;
            gap: 8px;
            z-index: 5;
        }
        .card-utility-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            color: #abbccd;
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card-utility-btn:hover { background: white; color: black; }
        .card-utility-btn.danger-wipe:hover { background: #ff0055; color: white; border-color: #ff0055; }

        .card-inner-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-inner-body h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.3;
            color: var(--text-pure);
        }
        .card-inner-body p {
            color: var(--text-stardust);
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 20px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Reactions Layout */
        .reaction-row-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            position: relative;
            z-index: 5;
        }
        .pill-trigger-btn {
            background: #171e2e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #8da2c4;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        .pill-trigger-btn:hover {
            background: #202b42;
            color: white;
        }
        .pill-trigger-btn.active-state {
            background: rgba(137, 82, 255, 0.15);
            border-color: #8952ff;
            color: #b394ff;
        }

        .tag-row-box {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }
        .tag-pill-node {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #171e2e;
            color: #728fb8;
            padding: 5px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* --- SYSTEM INTERFACE MODALS MATRIX --- */
        .glass-overlay-mask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 23, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center; justify-content: center;
            z-index: 10000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }
        .glass-overlay-mask.active { opacity: 1; visibility: visible; }

        .glass-modal-vault {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 95%; max-width: 520px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .glass-overlay-mask.active .glass-modal-vault { transform: translateY(0); }

        .modal-head-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .modal-head-row h2 {
            font-size: 1.5em; color: white; margin: 0;
        }
        .modal-close-trigger {
            background: none; border: none;
            color: #6b82a6; font-size: 1.4em; cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close-trigger:hover { color: white; }

        .input-block-node { margin-bottom: 20px; }
        .input-block-node label {
            display: block; margin-bottom: 8px; font-weight: 600;
            font-size: 14px; color: #8da2c4;
        }
        .input-block-node input[type="text"],
        .input-block-node textarea,
        .input-block-node select {
            width: 100%; padding: 12px 15px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08); background: #111622;
            color: white; font-family: var(--font-sans); font-size: 14px;
            box-sizing: border-box; outline: none;
        }
        .input-block-node input[type="text"]:focus,
        .input-block-node textarea:focus,
        .input-block-node select:focus {
            border-color: #8952ff;
        }
        .input-block-node select option { background: var(--panel-bg); color: white; }

        .checkbox-grid-matrix {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .cb-organic-label {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; font-size: 14px; color: #abbccd;
        }
        .cb-organic-label input { accent-color: #8952ff; width: 16px; height: 16px; }

        .modal-action-footer {
            display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px;
        }
        .btn-core {
            padding: 11px 24px; font-family: var(--font-sans);
            font-size: 14px; font-weight: 600; cursor: pointer;
            border-radius: 8px; border: none; transition: all 0.2s;
        }
        .btn-core.dismiss { background: #111622; color: #abbccd; }
        .btn-core.dismiss:hover { color: white; }
        .btn-core.save-execute { background: #8952ff; color: white; }
        .btn-core.save-execute:hover { background: #763fff; }

        /* Viewer Unique Elements Box */
        .view-emoji-container { font-size: 3.5em; text-align: center; margin-bottom: 15px; }
        .view-title { font-size: 1.6em; font-weight: 700; color: white; text-align: center; margin: 0 0 15px 0; }
        .view-desc { color: var(--text-stardust); font-size: 15px; line-height: 1.6; background: #111622; padding: 22px; border-radius: 12px; max-height: 350px; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; word-break: break-word; }
        .view-tags-label { font-size: 12px; font-weight: 700; color: #6b82a6; text-transform: uppercase; margin-bottom: 8px; display: block; }

        .zero-state-logs {
            text-align: center; color: #6b82a6; font-size: 1.1em;
            margin-top: 40px; grid-column: 1 / -1; display: none;
        }
    </style>
</head>
<body>

    <div class="starfield"></div>

    <section class="hero-viewport">
        <div class="top-left-airplane"><i class="fa-regular fa-paper-plane"></i></div>
        <div class="bottom-left-burger"><span></span><span></span><span></span></div>

        <h1>BA Reminders</h1>
        <p>Operations Logistics & Centralized Information Terminal</p>
        
        <a href="#dashboardDeck" class="btn-cosmic-pill">Explore Core Parameters</a>

        <div class="scroll-down-indicator">
            <span>Scroll Down</span>
            <div class="mouse-node"></div>
        </div>

        <div class="planetary-horizon"></div>
    </section>

    <main class="dashboard-content-section" id="dashboardDeck">
        
        <div class="dashboard-header-flow">
            <div class="system-title-box">
                <h2>Control Room Base</h2>
                <div class="subtitle" id="currentDate"></div>
            </div>
            
            <div class="action-cluster">
                <div class="search-engine-pod">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search keywords (e.g. Bonus, Bank Wire)...">
                </div>
                <button class="btn-action-trigger" onclick="openModal()">
                    <i class="fas fa-plus"></i> New Post
                </button>
            </div>
        </div>

        <div class="glass-ribbon" id="categoriesContainer"></div>

        <div class="matrix-grid" id="remindersGrid"></div>
        <div class="zero-state-logs" id="noResults">Oops!<br>No reminders found.</div>
    </main>

    <div class="glass-overlay-mask" id="postModal">
        <div class="glass-modal-vault">
            <div class="modal-head-row">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="modal-close-trigger" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="postForm" onsubmit="savePost(event)">
                <input type="hidden" id="postId">
                
                <div class="input-block-node">
                    <label>Title</label>
                    <input type="text" id="postTitleInput" required placeholder="Enter reminder title...">
                </div>

                <div class="input-block-node">
                    <label>Assign Icon / Topic</label>
                    <select id="postEmojiInput">
                        <option value="💡">General Info 💡</option>
                        <option value="🎁">Bonuses / Promos 🎁</option>
                        <option value="⚽">Sports / Sportsbooks ⚽</option>
                        <option value="🎰">Casino 🎰</option>
                        <option value="🎟️">Lotto 🎟️</option>
                        <option value="💳">Deposits 💳</option>
                        <option value="💰">Money / Payouts 💰</option>
                    </select>
                </div>
                
                <div class="input-block-node">
                    <label>Information</label>
                    <textarea id="postDescInput" required placeholder="Enter the details..." style="height: 120px; resize: vertical;"></textarea>
                </div>
                
                <div class="input-block-node">
                    <label>Categories (Select at least one)</label>
                    <div class="checkbox-grid-matrix" id="checkboxesContainer"></div>
                </div>

                <div class="modal-action-footer">
                    <button type="button" class="btn-core dismiss" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-core save-execute">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <div class="glass-overlay-mask" id="viewPostModal">
        <div class="glass-modal-vault">
            <div class="modal-head-row">
                <h2>Reminder Details</h2>
                <button class="modal-close-trigger" onclick="closeViewModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="view-emoji-container" id="viewPostEmoji">💡</div>
            <h3 class="view-title" id="viewPostTitle">Title Placeholder</h3>
            <div class="view-desc" id="viewPostDesc">Full description details go here...</div>
            
            <span class="view-tags-label">Assigned Categories</span>
            <div class="tag-row-box" id="viewPostTags" style="margin-bottom: 25px;"></div>
            
            <div class="modal-action-footer">
                <button type="button" class="btn-core save-execute" style="background: #6a3aff;" onclick="closeViewModal()">Close View</button>
            </div>
        </div>
    </div>

    <script>
        // Set Header Calendar Time Stream Logs
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', dateOptions).toUpperCase();

        // Baseline Native Seeds Collection restored from original base parameters
        const defaultReminders = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals. This streamlines processing times significantly for all regional requests.", categories: ["Payouts", "General Info"], emoji: "💰", reactions: { "👍": 2, "🔥": 1, "📌": 0, "👀": 0 } },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more. Make sure the documentation matches perfectly.", categories: ["General Info"], emoji: "💡", reactions: { "👍": 0, "🔥": 0, "📌": 3, "👀": 1 } },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"], emoji: "🎁", reactions: { "👍": 1, "🔥": 4, "📌": 0, "👀": 2 } }
        ];

        let reminders = JSON.parse(localStorage.getItem('ba_reminders')) || defaultReminders;
        const catOptions = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        const allCategoriesTab = ["All", ...catOptions];
        
        let currentCategory = "All";
        let searchTerm = "";

        const grid = document.getElementById('remindersGrid');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const modal = document.getElementById('postModal');
        const viewModal = document.getElementById('viewPostModal');

        function init() {
            renderTabs();
            renderCheckboxes();
            renderReminders();
        }

        function renderTabs() {
            categoriesContainer.innerHTML = '';
            allCategoriesTab.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `ribbon-cell ${cat === currentCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderTabs();
                    renderReminders();
                };
                categoriesContainer.appendChild(btn);
            });
        }

        function renderCheckboxes() {
            const container = document.getElementById('checkboxesContainer');
            container.innerHTML = '';
            catOptions.forEach(cat => {
                container.innerHTML += `
                    <label class="cb-organic-label">
                        <input type="checkbox" value="${cat}" class="cat-checkbox"> ${cat}
                    </label>
                `;
            });
        }

        function getGradientClass(emoji) {
            if (emoji === '⚽') return 'var(--gradient-sports)';
            if (emoji === '🎰' || emoji === '🎟️') return 'var(--gradient-casino)';
            if (emoji === '💰') return 'var(--gradient-money)';
            if (emoji === '💳' || emoji === '💡') return 'var(--gradient-general)';
            if (emoji === '🎁') return 'var(--gradient-bonus)';
            return 'var(--gradient-general)';
        }

        function renderReminders() {
            grid.innerHTML = '';
            let filtered = reminders;

            if (currentCategory !== "All") {
                filtered = filtered.filter(item => item.categories.includes(currentCategory));
            }

            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(term) || 
                    item.description.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                [...filtered].reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'quantum-card';
                    
                    card.onclick = (e) => {
                        if (!e.target.closest('.card-ambient-actions') && !e.target.closest('.reaction-row-wrapper')) {
                            openViewModal(item.id);
                        }
                    };
                    
                    const tagsHtml = item.categories.map(cat => `<span class="tag-pill-node">${cat}</span>`).join('');
                    const postReactions = item.reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                    const itemEmoji = item.emoji || "💡";
                    const backgroundGradientStyle = getGradientClass(itemEmoji);

                    const userReacted1 = localStorage.getItem(`reacted_${item.id}_👍`) ? 'active-state' : '';
                    const userReacted2 = localStorage.getItem(`reacted_${item.id}_🔥`) ? 'active-state' : '';
                    const userReacted3 = localStorage.getItem(`reacted_${item.id}_📌`) ? 'active-state' : '';
                    const userReacted4 = localStorage.getItem(`reacted_${item.id}_👀`) ? 'active-state' : '';

                    card.innerHTML = `
                        <div class="card-visual-header" style="background: ${backgroundGradientStyle}">
                            <div class="card-ambient-actions">
                                <button class="card-utility-btn" onclick="editPost(${item.id}); event.stopPropagation();" title="Edit Post"><i class="fas fa-pen"></i></button>
                                <button class="card-utility-btn danger-wipe" onclick="deletePost(${item.id}); event.stopPropagation();" title="Delete Post"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="big-emoji">${itemEmoji}</div>
                        </div>
                
                        <div class="card-inner-body">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                            
                            <div class="reaction-row-wrapper">
                                <button class="pill-trigger-btn ${userReacted1}" onclick="addReaction(${item.id}, '👍'); event.stopPropagation();">
                                    <span>👍</span> <span class="rc-count">${postReactions['👍'] || 0}</span>
                                </button>
                                <button class="pill-trigger-btn ${userReacted2}" onclick="addReaction(${item.id}, '🔥'); event.stopPropagation();">
                                    <span>🔥</span> <span class="rc-count">${postReactions['🔥'] || 0}</span>
                                </button>
                                <button class="pill-trigger-btn ${userReacted3}" onclick="addReaction(${item.id}, '📌'); event.stopPropagation();">
                                    <span>📌</span> <span class="rc-count">${postReactions['📌'] || 0}</span>
                                </button>
                                <button class="pill-trigger-btn ${userReacted4}" onclick="addReaction(${item.id}, '👀'); event.stopPropagation();">
                                    <span>👀</span> <span class="rc-count">${postReactions['👀'] || 0}</span>
                                </button>
                            </div>

                            <div class="tag-row-box">${tagsHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function addReaction(id, emojiKey) {
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                if (!reminders[index].reactions) {
                    reminders[index].reactions = { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                }
                
                const trackingKey = `reacted_${id}_${emojiKey}`;
                const userAlreadyReacted = localStorage.getItem(trackingKey);

                if (userAlreadyReacted) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(trackingKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(trackingKey, 'true');
                }
                
                saveData();
                renderReminders();
            }
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderReminders();
        });

        function openModal() {
            document.getElementById('postForm').reset();
            document.getElementById('postId').value = '';
            document.getElementById('postEmojiInput').value = '💡';
            document.getElementById('modalTitle').innerText = "Create New Post";
            
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function openViewModal(id) {
            const post = reminders.find(r => r.id === id);
            if (post) {
                document.getElementById('viewPostEmoji').innerText = post.emoji || '💡';
                document.getElementById('viewPostTitle').innerText = post.title;
                document.getElementById('viewPostDesc').innerText = post.description;
                
                const tagsContainer = document.getElementById('viewPostTags');
                tagsContainer.innerHTML = post.categories.map(cat => `<span class="tag-pill-node">${cat}</span>`).join('');
                
                viewModal.classList.add('active');
            }
        }

        function closeViewModal() {
            viewModal.classList.remove('active');
        }

        function editPost(id) {
            const post = reminders.find(r => r.id === id);
            if(post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postTitleInput').value = post.title;
                document.getElementById('postDescInput').value = post.description;
                document.getElementById('postEmojiInput').value = post.emoji || '💡';
                document.getElementById('modalTitle').innerText = "Edit Post";
                
                const checkboxes = document.querySelectorAll('.cat-checkbox');
                checkboxes.forEach(cb => {
                    cb.checked = post.categories.includes(cb.value);
                });
                modal.classList.add('active');
            }
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this reminder?")) {
                reminders = reminders.filter(r => r.id !== id);
                ['👍', '🔥', '📌', '👀'].forEach(k => localStorage.removeItem(`reacted_${id}_${k}`));
                saveData();
                renderReminders();
            }
        }

        function savePost(event) {
            event.preventDefault();
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitleInput').value;
            const description = document.getElementById('postDescInput').value;
            const emoji = document.getElementById('postEmojiInput').value;
            
            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCategories = Array.from(checkboxes).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                alert("Please select at least one category.");
                return;
            }

            if (id) {
                const index = reminders.findIndex(r => r.id == id);
                const existingReactions = reminders[index].reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                reminders[index] = { id: parseInt(id), title, description, categories: selectedCategories, emoji, reactions: existingReactions };
            } else {
                const newId = Date.now();
                reminders.push({ 
                    id: newId, title, description, categories: selectedCategories, emoji, 
                    reactions: { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 } 
                });
            }

            saveData();
            closeModal();
            renderReminders();
        }

        function saveData() {
            localStorage.setItem('ba_reminders', JSON.stringify(reminders));
        }

        // Ignition Central Core Engine
        init();
    </script>
</body>
</html>
