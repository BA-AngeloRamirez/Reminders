<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOL // TERMINAL 02</title>
    
    <!-- Cybernetic & Editorial Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-cyber: #030304;
            --panel-cyber: #0b0c10;
            --border-cyber: #1f222e;
            --text-cyber: #ffffff;
            --text-dimmed: #525866;
            --neon-alert: #ef4444;
            --neon-safe: #10b981;
            --font-mono: 'JetBrains Mono', monospace;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-cyber);
            color: var(--text-cyber);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Ambient Scanning Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Dynamic Peripheral Alert Vignette */
        .vignette-alert {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(239, 68, 68, 0);
            pointer-events: none;
            z-index: 5;
            transition: box-shadow 0.5s ease;
        }

        .vignette-alert.active {
            box-shadow: inset 0 0 120px rgba(239, 68, 68, 0.15);
        }

        /* Module Frame */
        .terminal-vault {
            background: var(--panel-cyber);
            border: 1px solid var(--border-cyber);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            transform: rotateX(2deg);
            transition: border-color 0.4s ease;
        }

        .terminal-vault.alert-border {
            border-color: var(--neon-alert);
        }

        /* System Header */
        .vault-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-cyber);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .sys-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: var(--text-dimmed);
            text-transform: uppercase;
        }

        .status-badge {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.05);
            color: var(--neon-safe);
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge.triggered {
            background: rgba(239, 68, 68, 0.07);
            color: var(--neon-alert);
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 10px rgba(239,68,68,0.2); }
            100% { opacity: 0.8; }
        }

        /* Main Payload Content */
        .vault-body h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        .vault-body p {
            color: #a3a3a6;
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 35px 0;
            font-weight: 300;
        }

        /* Interactive Matrix Simulator Area */
        .simulator-matrix {
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-cyber);
            padding: 24px;
            margin-bottom: 35px;
            position: relative;
        }

        .sim-header {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-dimmed);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .live-counter {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .live-counter.warn {
            color: var(--neon-alert);
        }

        /* Sleek Range Input Customization */
        .cyber-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border-cyber);
            outline: none;
            margin: 10px 0;
        }

        .cyber-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffffff;
            cursor: pointer;
            border-radius: 0; /* Brutalist block look */
            transition: background 0.2s;
        }

        .terminal-vault.alert-border .cyber-slider::-webkit-slider-thumb {
            background: var(--neon-alert);
        }

        /* Tactical Requirement Panel Alert */
        .req-panel {
            margin-top: 15px;
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border-left: 2px solid var(--text-dimmed);
            color: var(--text-dimmed);
            transition: all 0.3s ease;
        }

        .req-panel.active {
            border-left-color: var(--neon-alert);
            background: rgba(239, 68, 68, 0.03);
            color: #ffffff;
        }

        /* Footer System Buttons */
        .vault-actions {
            display: flex;
            gap: 15px;
        }

        .action-node-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-cyber);
            color: var(--text-cyber);
            padding: 14px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .action-node-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .action-node-btn.primary-alert {
            background: transparent;
            border-color: var(--border-cyber);
        }

        .action-node-btn.primary-alert.active-alert-mode {
            background: var(--neon-alert);
            color: #ffffff;
            border-color: var(--neon-alert);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
        
        .action-node-btn.primary-alert.active-alert-mode:hover {
            background: #ff5555;
        }
    </style>
</head>
<body>

    <div class="vignette-alert" id="vignette"></div>

    <!-- The Vault Node 02 -->
    <div class="terminal-vault" id="vaultContainer">
        <div class="vault-header">
            <div class="sys-title">Node // Protocol-02</div>
            <div class="status-badge" id="statusBadge">
                <i class="fas fa-circle" style="font-size: 6px;"></i> <span id="statusText">System Clear</span>
            </div>
        </div>

        <div class="vault-body">
            <h1>Information Change Protocol</h1>
            <p>Security parameter rule: Verification mapping is exclusively required for email modifications based on liquid capital conditions.</p>
            
            <!-- Real-time Simulator Block -->
            <div class="simulator-matrix">
                <div class="sim-header">
                    <span>Account Balance Simulator</span>
                    <span>Threshold: $150.00</span>
                </div>
                <div class="live-counter" id="liveCounter">$0.00</div>
                <input type="range" min="0" max="300" value="75" class="cyber-slider" id="balanceSlider">
                
                <div class="req-panel" id="reqPanel">
                    <i class="fas fa-shield-halved" id="reqIcon"></i> <span id="reqText">ID Verification Not Required</span>
                </div>
            </div>
        </div>

        <div class="vault-actions">
            <button class="action-node-btn"><i class="fas fa-code-branch"></i> Log Chain</button>
            <button class="action-node-btn primary-alert" id="actionBtn"><i class="fas fa-id-card"></i> Proceed</button>
        </div>
    </div>

    <script>
        const slider = document.getElementById('balanceSlider');
        const counter = document.getElementById('liveCounter');
        const vault = document.getElementById('vaultContainer');
        const badge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const reqPanel = document.getElementById('reqPanel');
        const reqText = document.getElementById('reqText');
        const actionBtn = document.getElementById('actionBtn');
        const vignette = document.getElementById('vignette');

        function evaluateProtocolMetrics(value) {
            // Update real-time balance layout counter
            counter.innerText = `$${parseFloat(value).toFixed(2)}`;

            // Check architectural rules ($150 threshold triggers strict ID requirement)
            if (value >= 150) {
                counter.classList.add('warn');
                vault.classList.add('alert-border');
                badge.classList.add('triggered');
                statusText.innerText = "Auth Required";
                
                reqPanel.classList.add('active');
                reqText.innerText = "CRITICAL: Valid ID Verification Mandated";
                
                actionBtn.classList.add('active-alert-mode');
                vignette.classList.add('active');
            } else {
                counter.classList.remove('warn');
                vault.classList.remove('alert-border');
                badge.classList.remove('triggered');
                statusText.innerText = "System Clear";
                
                reqPanel.classList.remove('active');
                reqText.innerText = "ID Verification Not Required";
                
                actionBtn.classList.remove('active-alert-mode');
                vignette.classList.remove('active');
            }
        }

        // Real-time Event Listener Matrix
        slider.addEventListener('input', (e) => {
            evaluateProtocolMetrics(e.target.value);
        });

        // Initialize at custom baseline value ($75)
        evaluateProtocolMetrics(slider.value);
    </script>
</body>
</html>
