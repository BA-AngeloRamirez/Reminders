<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // CENTRAL SECURITY PROTOCOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-matrix: #030407;
            --panel-hex: #0a0e17;
            --panel-elevated: #111827;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-alert: #ff0055;
            --text-main: #f3f4f6;
            --text-dimmed: #64748b;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-matrix);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline Cinema Overlay & Ambient Grid */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Peripheral Danger Alert Vignette */
        .ambient-vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(255, 0, 85, 0);
            pointer-events: none;
            z-index: 9998;
            transition: box-shadow 0.4s ease;
        }
        body.terminal-emergency .ambient-vignette {
            box-shadow: inset 0 0 200px rgba(255, 0, 85, 0.35);
            animation: pulse-vignette 2s infinite alternate;
        }

        @keyframes pulse-vignette {
            0% { box-shadow: inset 0 0 100px rgba(255, 0, 85, 0.2); }
            100% { box-shadow: inset 0 0 250px rgba(255, 0, 85, 0.45); }
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
        }

        /* Sci-Fi Brutalist Header */
        .terminal-header {
            background: linear-gradient(135deg, #0b0f19 0%, #04060b 100%);
            border: 1px solid var(--glass-border);
            border-left: 5px solid var(--neon-blue);
            padding: 40px;
            border-radius: 4px;
            position: relative;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .terminal-header::after {
            content: "SECURE NODE // AUTH-02";
            position: absolute;
            top: 15px; right: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dimmed);
        }

        .terminal-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #ffffff 0%, #9ab5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-status-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px; height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
        }

        /* Controls Cluster */
        .control-matrix {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            background: rgba(10, 14, 23, 0.7);
            border: 1px solid var(--glass-border);
            padding: 16px 20px 16px 55px;
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-wrapper input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            background: var(--panel-hex);
        }

        .search-wrapper i {
            position: absolute;
            left: 22px; top: 50%;
            transform: translateY(-50%);
            color: var(--neon-blue);
            font-size: 18px;
        }

        .btn-prime {
            background: linear-gradient(90deg, var(--neon-purple), #7000ff);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-prime:hover {
            box-shadow: 0 0 25px rgba(189, 0, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Filter Ribbons */
        .ribbon {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .ribbon-node {
            background: transparent;
            color: var(--text-dimmed);
            border: 1px solid var(--glass-border);
            padding: 10px 22px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ribbon-node:hover {
            color: white;
            border-color: rgba(255,255,255,0.2);
        }

        .ribbon-node.active {
            background: rgba(0, 240, 255, 0.05);
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        /* Tactical Data Grid */
        .grid-canvas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
        }

        .data-card {
            background: linear-gradient(145deg, #0a0e17 0%, #05070c 100%);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 350px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .data-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--text-dimmed);
            transition: background 0.3s;
        }

        /* Custom top highlight lines per icon logic */
        .data-card.accent-sports::before { background: var(--neon-green); }
        .data-card.accent-casino::before { background: var(--neon-purple); }
        .data-card.accent-money::before { background: #ffd700; }
        .data-card.accent-general::before { background: var(--neon-blue); }
        .data-card.accent-bonus::before { background: var(--neon-alert); }

        .data-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .card-header-deck {
            padding: 25px 25px 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .data-card:hover .card-actions { opacity: 1; }

        .action-mini {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 32px; height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .action-mini:hover {
            background: white; color: black;
        }
        .action-mini.purge:hover {
            background: var(--neon-alert); color: white; border-color: var(--neon-alert);
        }

        .card-body-deck {
            padding: 10px 25px 25px 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-body-deck h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.5px;
        }

        .card-body-deck p {
            color: var(--text-dimmed);
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 25px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Hologram Reactions */
        .reaction-cluster {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .react-node-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            color: var(--text-dimmed);
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .react-node-btn:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        .react-node-btn.fired {
            background: rgba(0, 240, 255, 0.08);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .tag-deck {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
            border-top: 1px dashed rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .tag-node {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.02);
            color: var(--text-dimmed);
            padding: 4px 10px;
            border-radius: 2px;
        }

        /* Modernist Quantum Modals */
        .modal-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 3, 6, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center; justify-content: center;
            z-index: 10000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-blur.active {
            opacity: 1; visibility: visible;
        }

        .modal-vault {
            background: #090d16;
            border: 1px solid var(--glass-border);
            width: 95%; max-width: 550px;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-blur.active .modal-vault {
            transform: scale(1) translateY(0);
        }

        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .modal-top h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            margin: 0;
            text-transform: uppercase;
        }

        .modal-kill {
            background: none; border: none;
            color: var(--text-dimmed);
            font-size: 20px; cursor: pointer;
            transition: color 0.2s;
        }

        .modal-kill:hover { color: var(--neon-alert); }

        .group-node { margin-bottom: 24px; }

        .group-node label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dimmed);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .group-node input[type="text"],
        .group-node textarea,
        .group-node select {
            width: 100%;
            background: #04060a;
            border: 1px solid var(--glass-border);
            padding: 14px;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        .group-node input[type="text"]:focus,
        .group-node textarea:focus,
        .group-node select:focus {
            border-color: var(--neon-blue);
        }

        .checkbox-vault-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .cb-luxury-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #94a3b8;
        }

        .modal-foot {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 35px;
        }

        .btn-action {
            padding: 14px 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-action.abort {
            background: transparent; border: 1px solid var(--glass-border); color: var(--text-dimmed);
        }
        .btn-action.abort:hover { color: white; border-color: rgba(255,255,255,0.2); }

        .btn-action.commit {
            background: var(--neon-blue); border: none; color: black;
        }
        .btn-action.commit:hover { box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }

        /* Tactical Intelligence Simulator Submodule */
        .tactical-simulator-box {
            background: #04060a;
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 4px;
            margin: 25px 0;
            display: none;
            border-left: 3px solid var(--neon-blue);
        }

        body.terminal-emergency .tactical-simulator-box {
            border-left-color: var(--neon-alert);
        }

        .sim-meta-row {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dimmed);
            text-transform: uppercase;
        }

        .sim-live-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            margin: 10px 0;
            transition: color 0.3s;
        }
        .sim-live-display.breached { color: var(--neon-alert); text-shadow: 0 0 15px rgba(255,0,85,0.4); }

        .quantum-slider {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            background: #1e293b; outline: none;
            margin: 15px 0; border-radius: 2px;
        }
        .quantum-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: white; cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: transform 0.1s;
        }
        .quantum-slider::-webkit-slider-thumb:hover { transform: scale(1.25); }

        .shield-indicator-panel {
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center; gap: 12px;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--glass-border);
            color: var(--text-dimmed);
            border-radius: 2px;
        }
        .shield-indicator-panel.active {
            border-color: var(--neon-alert);
            color: white;
            background: rgba(255, 0, 85, 0.03);
        }

        .empty-matrix-notice {
            text-align: center;
            color: var(--text-dimmed);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            grid-column: 1 / -1;
            padding: 80px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input[type="checkbox"] {
            accent-color: var(--neon-blue);
            width: 16px; height: 16px;
        }
    </style>
</head>
<body>

    <div class="ambient-vignette" id="vignette"></div>

    <div class="container">
        <header class="terminal-header">
            <h1>BA Matrix Terminal</h1>
            <div class="system-status-bar">
                <div class="status-dot"></div>
                <span id="dateLog">ESTABLISHING CONNECTION...</span>
            </div>
            
            <div class="control-matrix">
                <div class="search-wrapper">
                    <i class="fas fa-terminal"></i>
                    <input type="text" id="masterFilterInput" placeholder="Isolate parameters / query node identifiers...">
                </div>
                <button class="btn-prime" onclick="triggerNodeModal()">
                    <i class="fas fa-plus"></i> Inject Record Node
                </button>
            </div>
        </header>

        <div class="ribbon" id="filterRibbon"></div>

        <div class="grid-canvas" id="terminalGridCanvas"></div>
        <div class="empty-matrix-notice" id="emptyNotice" style="display:none;">Matrix Empty // Zero matching operational records isolated</div>
    </div>

    <div class="modal-blur" id="inputNodeModal">
        <div class="modal-vault">
            <div class="modal-top">
                <h2 id="modalLabelTitle">New Record Configuration</h2>
                <button class="modal-kill" onclick="dismissNodeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="vaultSchemaForm" onsubmit="executeDataCommit(event)">
                <input type="hidden" id="schemaNodeId">
                
                <div class="group-node">
                    <label>Title Parameter Identifier</label>
                    <input type="text" id="schemaTitle" required placeholder="Inject node title label...">
                </div>

                <div class="group-node">
                    <label>System Core Module Icon</label>
                    <select id="schemaEmoji">
                        <option value="💡">General Info Core 💡</option>
                        <option value="🎁">Promotional Matrix 🎁</option>
                        <option value="⚽">Athletics Module ⚽</option>
                        <option value="🎰">Casino Core Terminal 🎰</option>
                        <option value="🎟️">Lottery Architecture 🎟️</option>
                        <option value="💳">Deposit Vault Node 💳</option>
                        <option value="💰">Payout Ledger Target 💰</option>
                    </select>
                </div>
                
                <div class="group-node">
                    <label>Detailed Data Payload Logs</label>
                    <textarea id="schemaDesc" required placeholder="Write down operational rules..." style="height: 120px; resize: vertical;"></textarea>
                </div>
                
                <div class="group-node">
                    <label>Network Routing Node Vectors (Select multiple)</label>
                    <div class="checkbox-vault-grid" id="checkboxRoutingCluster"></div>
                </div>

                <div class="modal-foot">
                    <button type="button" class="btn-action abort" onclick="dismissNodeModal()">Abort Process</button>
                    <button type="submit" class="btn-action commit">Deploy Node</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-blur" id="readerViewModal">
        <div class="modal-vault" style="max-width: 600px; border-top: 4px solid var(--neon-blue);" id="readerFrame">
            <div class="modal-top" style="border-bottom: none; margin-bottom: 10px;">
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dimmed);" id="readerMetaIndex">NODE // READ</div>
                <button class="modal-kill" onclick="dismissReaderModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div style="font-size: 4rem; margin-bottom: 15px;" id="readIcon">💡</div>
            <h3 style="font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin: 0 0 20px 0; text-transform: uppercase; line-height: 1.2;" id="readTitle">Title</h3>
            
            <div style="background: #04060a; border: 1px solid var(--glass-border); padding: 25px; border-radius: 4px; font-size: 15px; line-height: 1.7; color: #cbd5e1; margin-bottom: 25px; white-space: pre-wrap;" id="readDesc">Description</div>
            
            <div class="tactical-simulator-box" id="embeddedTacticalSim">
                <div class="sim-meta-row">
                    <span>Liquidity Scanner Interrogator</span>
                    <span>Trigger Cap: $150.00</span>
                </div>
                <div class="sim-live-display" id="liveDollarDisplay">$75.00</div>
                <input type="range" min="0" max="300" value="75" class="quantum-slider" id="quantumRangeSlider">
                <div class="shield-indicator-panel" id="shieldStatusPanel">
                    <i class="fas fa-shield-halved"></i> <span id="shieldStatusText">Clearance Confirmed: ID Not Mandated</span>
                </div>
            </div>

            <label style="display:block; font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--text-dimmed); text-transform:uppercase; margin-bottom:10px;">Vector Routing Tags</label>
            <div class="tag-deck" id="readTags" style="border-top:none; padding-top:0;"></div>
            
            <div class="modal-foot">
                <button type="button" class="btn-action commit" style="width:100%; background: white; color:black; font-weight:700;" onclick="dismissReaderModal()">Acknowledge Node</button>
            </div>
        </div>
    </div>

    <script>
        // Synchronize Active Calendar Node
        const calOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('dateLog').innerText = `SYSTEM INTERFACE ACTIVE // ${new Date().toLocaleDateString('en-US', calOptions).toUpperCase()}`;

        // Raw Structural Seed Database
        const standardSeedReminders = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals. This streamlines processing times significantly for all regional requests.", categories: ["Payouts", "General Info"], emoji: "💰", reactions: { "👍": 12, "🔥": 4, "📌": 2, "👀": 9 } },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more. Make sure the documentation matches perfectly.", categories: ["General Info"], emoji: "💡", reactions: { "👍": 5, "🔥": 1, "📌": 28, "👀": 45 } },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"], emoji: "🎁", reactions: { "👍": 19, "🔥": 34, "📌": 3, "👀": 11 } }
        ];

        let reminders = JSON.parse(localStorage.getItem('quantum_matrix_reminders')) || standardSeedReminders;

        const baseCategories = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        let selectedCategoryFilter = "All";
        let activeQueryString = "";

        const gridCanvas = document.getElementById('terminalGridCanvas');
        const ribbonContainer = document.getElementById('filterRibbon');
        const searchInputBox = document.getElementById('masterFilterInput');
        const dataInputModal = document.getElementById('inputNodeModal');
        const interrogatorModal = document.getElementById('readerViewModal');
        const emptyNotice = document.getElementById('emptyNotice');

        // Simulator Engine DOM Map
        const rangeSlider = document.getElementById('quantumRangeSlider');
        const dollarDisplay = document.getElementById('liveDollarDisplay');
        const shieldPanel = document.getElementById('shieldStatusPanel');
        const shieldText = document.getElementById('shieldStatusText');
        const readerFrame = document.getElementById('readerFrame');

        function startEngine() {
            renderFilterRibbons();
            renderFormCheckboxes();
            pipelineRenderGrid();
            igniteSimulatorLink();
        }

        function renderFilterRibbons() {
            ribbonContainer.innerHTML = '';
            ["All", ...baseCategories].forEach(cat => {
                const button = document.createElement('button');
                button.className = `ribbon-node ${cat === selectedCategoryFilter ? 'active' : ''}`;
                button.textContent = cat;
                button.onclick = () => {
                    selectedCategoryFilter = cat;
                    renderFilterRibbons();
                    pipelineRenderGrid();
                };
                ribbonContainer.appendChild(button);
            });
        }

        function renderFormCheckboxes() {
            const container = document.getElementById('checkboxRoutingCluster');
            container.innerHTML = '';
            baseCategories.forEach(cat => {
                container.innerHTML += `
                    <label class="cb-luxury-label">
                        <input type="checkbox" value="${cat}" class="routing-cb-element"> ${cat}
                    </label>
                `;
            });
        }

        function resolveVisualThemeClass(emoji) {
            if (emoji === '⚽') return 'accent-sports';
            if (emoji === '🎰' || emoji === '🎟️') return 'accent-casino';
            if (emoji === '💰') return 'accent-money';
            if (emoji === '💳' || emoji === '💡') return 'accent-general';
            if (emoji === '🎁') return 'accent-bonus';
            return '';
        }

        function pipelineRenderGrid() {
            gridCanvas.innerHTML = '';
            let payloadStack = reminders;

            if (selectedCategoryFilter !== "All") {
                payloadStack = payloadStack.filter(node => node.categories.includes(selectedCategoryFilter));
            }

            if (activeQueryString.trim() !== "") {
                const sanitize = activeQueryString.toLowerCase();
                payloadStack = payloadStack.filter(node => 
                    node.title.toLowerCase().includes(sanitize) || 
                    node.description.toLowerCase().includes(sanitize)
                );
            }

            if (payloadStack.length === 0) {
                emptyNotice.style.display = 'block';
                return;
            }
            emptyNotice.style.display = 'none';

            [...payloadStack].reverse().forEach((node, dynamicIndex) => {
                const cardNode = document.createElement('div');
                const accentClass = resolveVisualThemeClass(node.emoji);
                cardNode.className = `data-card ${accentClass}`;
                
                cardNode.onclick = (e) => {
                    if (!e.target.closest('.card-actions') && !e.target.closest('.reaction-cluster')) {
                        triggerReaderPanel(node.id);
                    }
                };

                const mappedReacts = node.reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                const tagsString = node.categories.map(c => `<span class="tag-node">${c}</span>`).join('');
                const originalPositionIndex = String(payloadStack.length - dynamicIndex).padStart(2, '0');

                const r1Active = localStorage.getItem(`quantum_react_${node.id}_👍`) ? 'fired' : '';
                const r2Active = localStorage.getItem(`quantum_react_${node.id}_🔥`) ? 'fired' : '';
                const r3Active = localStorage.getItem(`quantum_react_${node.id}_📌`) ? 'fired' : '';
                const r4Active = localStorage.getItem(`quantum_react_${node.id}_👀`) ? 'fired' : '';

                cardNode.innerHTML = `
                    <div class="card-header-deck">
                        <div class="card-icon">${node.emoji || '💡'}</div>
                        <div class="card-actions">
                            <button class="action-mini" onclick="editNodeStructure(${node.id}); event.stopPropagation();" title="Modify Registry"><i class="fas fa-sliders"></i></button>
                            <button class="action-mini purge" onclick="executeNodePurge(${node.id}); event.stopPropagation();" title="Wipe Data"><i class="fas fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="card-body-deck">
                        <div style="font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-dimmed); margin-bottom:5px;">SEC-LOG // [${originalPositionIndex}]</div>
                        <h3>${node.title}</h3>
                        <p>${node.description}</p>
                        
                        <div class="reaction-cluster">
                            <button class="react-node-btn ${r1Active}" onclick="toggleQuantumReaction(${node.id}, '👍'); event.stopPropagation();">
                                <span>👍</span> <span>${mappedReacts['👍'] || 0}</span>
                            </button>
                            <button class="react-node-btn ${r2Active}" onclick="toggleQuantumReaction(${node.id}, '🔥'); event.stopPropagation();">
                                <span>🔥</span> <span>${mappedReacts['🔥'] || 0}</span>
                            </button>
                            <button class="react-node-btn ${r3Active}" onclick="toggleQuantumReaction(${node.id}, '📌'); event.stopPropagation();">
                                <span>📌</span> <span>${mappedReacts['📌'] || 0}</span>
                            </button>
                            <button class="react-node-btn ${r4Active}" onclick="toggleQuantumReaction(${node.id}, '👀'); event.stopPropagation();">
                                <span>👀</span> <span>${mappedReacts['👀'] || 0}</span>
                            </button>
                        </div>
                        <div class="tag-deck">${tagsString}</div>
                    </div>
                `;
                gridCanvas.appendChild(cardNode);
            });
        }

        function toggleQuantumReaction(id, emojiKey) {
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                if (!reminders[index].reactions) {
                    reminders[index].reactions = { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                }

                const reactionStateKey = `quantum_react_${id}_${emojiKey}`;
                if (localStorage.getItem(reactionStateKey)) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(reactionStateKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(reactionStateKey, 'true');
                }

                saveActiveMatrixState();
                pipelineRenderGrid();
            }
        }

        searchInputBox.addEventListener('input', (e) => {
            activeQueryString = e.target.value;
            pipelineRenderGrid();
        });

        function triggerNodeModal() {
            document.getElementById('vaultSchemaForm').reset();
            document.getElementById('schemaNodeId').value = '';
            document.getElementById('schemaEmoji').value = '💡';
            document.getElementById('modalLabelTitle').innerText = "Inject Record Node";
            document.querySelectorAll('.routing-cb-element').forEach(cb => cb.checked = false);
            dataInputModal.classList.add('active');
        }

        function dismissNodeModal() { dataInputModal.classList.remove('active'); }

        function triggerReaderPanel(id) {
            const node = reminders.find(r => r.id === id);
            if (node) {
                document.getElementById('readIcon').innerText = node.emoji || '💡';
                document.getElementById('readTitle').innerText = node.title;
                document.getElementById('readDesc').innerText = node.description;
                document.getElementById('readerMetaIndex').innerText = `NODE // CORE-ID-${node.id}`;
                
                const tagsBox = document.getElementById('readTags');
                tagsBox.innerHTML = node.categories.map(c => `<span class="tag-node" style="background:rgba(255,255,255,0.04); font-size:11px; padding:6px 12px; border:1px solid var(--glass-border);">${c}</span>`).join('');
                
                // Deploy Interrogator Simulator dynamically exclusively for Information Change Protocol
                const simBox = document.getElementById('embeddedTacticalSim');
                if (id === 2 || node.title.toLowerCase().includes("information change")) {
                    simBox.style.display = 'block';
                    evaluateSimulatorMetrics(rangeSlider.value);
                } else {
                    simBox.style.display = 'none';
                    document.body.classList.remove('terminal-emergency');
                    readerFrame.style.borderColor = 'var(--neon-blue)';
                }

                interrogatorModal.classList.add('active');
            }
        }

        function dismissReaderModal() {
            interrogatorModal.classList.remove('active');
            document.body.classList.remove('terminal-emergency');
        }

        function igniteSimulatorLink() {
            rangeSlider.addEventListener('input', (e) => {
                evaluateSimulatorMetrics(e.target.value);
            });
        }

        function evaluateSimulatorMetrics(val) {
            dollarDisplay.innerText = `$${parseFloat(val).toFixed(2)}`;
            if (val >= 150) {
                dollarDisplay.classList.add('breached');
                shieldPanel.classList.add('active');
                shieldText.innerText = "CRITICAL BREACH: Valid ID Verification Required";
                document.body.classList.add('terminal-emergency');
                readerFrame.style.borderColor = 'var(--neon-alert)';
            } else {
                dollarDisplay.classList.remove('breached');
                shieldPanel.classList.remove('active');
                shieldText.innerText = "Clearance Confirmed: ID Not Mandated";
                document.body.classList.remove('terminal-emergency');
                readerFrame.style.borderColor = 'var(--neon-blue)';
            }
        }

        function editNodeStructure(id) {
            const node = reminders.find(r => r.id === id);
            if (node) {
                document.getElementById('schemaNodeId').value = node.id;
                document.getElementById('schemaTitle').value = node.title;
                document.getElementById('schemaDesc').value = node.description;
                document.getElementById('schemaEmoji').value = node.emoji || '💡';
                document.getElementById('modalLabelTitle').innerText = "Modify Active Config Schema";
                
                document.querySelectorAll('.routing-cb-element').forEach(cb => {
                    cb.checked = node.categories.includes(cb.value);
                });
                dataInputModal.classList.add('active');
            }
        }

        function executeNodePurge(id) {
            if (confirm("Execute devastating file delete wipe on this specific data signature?")) {
                reminders = reminders.filter(r => r.id !== id);
                ['👍', '🔥', '📌', '👀'].forEach(k => localStorage.removeItem(`quantum_react_${id}_${k}`));
                saveActiveMatrixState();
                pipelineRenderGrid();
            }
        }

        function executeDataCommit(event) {
            event.preventDefault();
            const id = document.getElementById('schemaNodeId').value;
            const title = document.getElementById('schemaTitle').value;
            const description = document.getElementById('schemaDesc').value;
            const emoji = document.getElementById('schemaEmoji').value;
            
            const activeChecks = document.querySelectorAll('.routing-cb-element:checked');
            const targetCategories = Array.from(activeChecks).map(cb => cb.value);

            if (targetCategories.length === 0) {
                alert("Matrix Allocation Error: Bind this record to at least one routing node vector.");
                return;
            }

            if (id) {
                const idx = reminders.findIndex(r => r.id == id);
                const historicReacts = reminders[idx].reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                reminders[idx] = { id: parseInt(id), title, description, categories: targetCategories, emoji, reactions: historicReacts };
            } else {
                reminders.push({ 
                    id: Date.now(), title, description, categories: targetCategories, emoji, 
                    reactions: { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 } 
                });
            }

            saveActiveMatrixState();
            dismissNodeModal();
            pipelineRenderGrid();
        }

        function saveActiveMatrixState() {
            localStorage.setItem('quantum_matrix_reminders', JSON.stringify(reminders));
        }

        // Engage Engine Ignition Core
        startEngine();
    </script>
</body>
</html>
