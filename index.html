<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER // NEURAL RECORD DATA-LINK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --canvas-bg: #03050a;
            --glass-core: rgba(10, 15, 30, 0.45);
            --glass-sheet: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(255, 255, 255, 0.08);
            --hyper-cyan: #00f3ff;
            --hyper-pink: #ff007f;
            --hyper-emerald: #00ffaa;
            --hyper-amber: #ffaa00;
            --text-pure: #ffffff;
            --text-cloud: #94a3b8;
            --font-mono: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            scrollbar-width: none;
        }
        *::-webkit-scrollbar { display: none; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--canvas-bg);
            color: var(--text-pure);
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Fluid Aurora Backdrops */
        .aurora-layer {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
            transition: all 0.8s ease;
        }
        #aurora-1 { top: -10%; left: -10%; background: var(--hyper-cyan); }
        #aurora-2 { bottom: -10%; right: -10%; background: var(--hyper-pink); }

        body.breach-emergency #aurora-1 { background: var(--hyper-pink); opacity: 0.25; scale: 1.2; }
        body.breach-emergency #aurora-2 { background: #ff0000; opacity: 0.25; scale: 1.2; }

        /* Tactical Critical Screen Vignette Blur */
        .plasma-vignette {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 9999;
            border: 0px solid rgba(255, 0, 127, 0);
            transition: all 0.3s ease;
        }
        body.breach-emergency .plasma-vignette {
            box-shadow: inset 0 0 100px rgba(255, 0, 85, 0.3);
            border: 2px solid rgba(255, 0, 127, 0.4);
        }

        .wrapper {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Neomorphic Floating Frosted Glass Header */
        .aether-header {
            background: var(--glass-core);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border-glow);
            padding: 45px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            margin-bottom: 50px;
        }

        .aether-header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 3.8rem;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta-stamp-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 12px;
        }

        .quantum-pulse-dot {
            width: 6px; height: 6px;
            background-color: var(--hyper-emerald);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--hyper-emerald);
            animation: pulse-flux 1.5s infinite alternate;
        }
        @keyframes pulse-flux {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 6px var(--hyper-emerald); }
            100% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 16px var(--hyper-emerald); }
        }

        .live-chronograph {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--hyper-cyan);
            letter-spacing: 2px;
        }

        .action-cluster-deck {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .search-nebula {
            flex-grow: 1;
            position: relative;
            max-width: 750px;
        }

        .search-nebula input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glow);
            padding: 18px 24px 18px 60px;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .search-nebula input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--hyper-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
        }

        .search-nebula i {
            position: absolute;
            left: 24px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-cloud);
            font-size: 18px;
        }

        .btn-fluid {
            background: white;
            color: black;
            border: none;
            padding: 0 35px;
            border-radius: 16px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn-fluid:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
            background: var(--hyper-cyan);
        }

        /* Kinetic Filter Ribbons */
        .glass-ribbon {
            display: flex;
            gap: 12px;
            margin-bottom: 45px;
            overflow-x: auto;
        }

        .ribbon-cell {
            background: var(--glass-sheet);
            border: 1px solid var(--border-glow);
            color: var(--text-cloud);
            padding: 12px 26px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .ribbon-cell:hover {
            color: white;
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.2);
        }

        .ribbon-cell.active {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* Ultra-Edge Card Grid Matrix */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 35px;
        }

        .quantum-card {
            background: var(--glass-core);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glow);
            border-radius: 28px;
            padding: 30px;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        .quantum-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        /* Top Corner Dynamic Status Glow Points */
        .card-ambient-node {
            position: absolute;
            top: 30px; right: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .card-utility-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-glow);
            color: var(--text-cloud);
            width: 36px; height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
        }

        .quantum-card:hover .card-utility-btn { opacity: 1; }
        .card-utility-btn:hover { background: white; color: black; border-color: white; }
        .card-utility-btn.danger-wipe:hover { background: var(--hyper-pink); color: white; border-color: var(--hyper-pink); }

        .card-icon-hub {
            font-size: 2.8rem;
            margin-bottom: 25px;
            width: fit-content;
            transition: transform 0.3s;
        }
        .quantum-card:hover .card-icon-hub { transform: scale(1.1) rotate(5deg); }

        /* Categorized Soft Base Glow Shadows */
        .quantum-card.theme-sports .card-icon-hub { filter: drop-shadow(0 0 15px var(--hyper-emerald)); }
        .quantum-card.theme-casino .card-icon-hub { filter: drop-shadow(0 0 15px var(--hyper-pink)); }
        .quantum-card.theme-money .card-icon-hub { filter: drop-shadow(0 0 15px var(--hyper-amber)); }
        .quantum-card.theme-general .card-icon-hub { filter: drop-shadow(0 0 15px var(--hyper-cyan)); }
        .quantum-card.theme-bonus .card-icon-hub { filter: drop-shadow(0 0 15px #7000ff); }

        .quantum-card h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.55rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.25;
            letter-spacing: -0.5px;
        }

        .quantum-card p {
            color: var(--text-cloud);
            font-size: 14.5px;
            line-height: 1.65;
            margin: 0 0 30px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Neomorphic Organic Reactions Layout */
        .reaction-row {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .pill-trigger {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glow);
            color: var(--text-cloud);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center; gap: 8px;
            transition: all 0.2s;
        }

        .pill-trigger:hover {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        .pill-trigger.active-state {
            background: rgba(0, 243, 255, 0.08);
            border-color: var(--hyper-cyan);
            color: var(--hyper-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .tag-row-box {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 20px;
        }

        .tag-pill-node {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-cloud);
            background: rgba(255,255,255,0.03);
            padding: 5px 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        /* Glass Vault Modals */
        .glass-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 8, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            align-items: center; justify-content: center;
            z-index: 10000;
            opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-overlay.active { opacity: 1; visibility: visible; }

        .glass-modal-vault {
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255,255,255,0.08);
            width: 95%; max-width: 580px;
            padding: 45px;
            border-radius: 32px;
            box-shadow: 0 60px 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: scale(0.92) translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .glass-overlay.active .glass-modal-vault { transform: scale(1) translateY(0); }

        .modal-head-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .modal-head-row h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem; margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .modal-close-trigger {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glow);
            color: var(--text-cloud); width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .modal-close-trigger:hover { color: white; background: var(--hyper-pink); border-color: var(--hyper-pink); }

        .input-block-node { margin-bottom: 26px; }

        .input-block-node label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-cloud);
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .input-block-node input[type="text"],
        .input-block-node textarea,
        .input-block-node select {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border-glow);
            padding: 16px;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .input-block-node input[type="text"]:focus,
        .input-block-node textarea:focus,
        .input-block-node select:focus {
            border-color: var(--hyper-cyan);
            background: rgba(0,0,0,0.4);
        }

        .checkbox-flex-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .cb-organic-label {
            display: flex;
            align-items: center; gap: 12px;
            cursor: pointer; font-size: 14px; color: var(--text-cloud);
        }

        .modal-action-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
        }

        .btn-core {
            padding: 15px 30px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13.5px; font-weight: 700;
            text-transform: uppercase; cursor: pointer;
            border-radius: 14px; transition: all 0.2s;
        }

        .btn-core.dismiss { background: transparent; border: 1px solid var(--border-glow); color: var(--text-cloud); }
        .btn-core.dismiss:hover { color: white; border-color: rgba(255,255,255,0.2); }
        .btn-core.save-execute { background: white; border: none; color: black; }
        .btn-core.save-execute:hover { background: var(--hyper-cyan); box-shadow: 0 10px 25px rgba(0, 243, 255, 0.3); }

        /* Next-Gen Holographic Circular Simulator Block */
        .hologram-simulator-module {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border-glow);
            padding: 30px;
            border-radius: 24px;
            margin: 30px 0;
            display: none;
        }

        .sim-header-row {
            display: flex; justify-content: space-between;
            font-family: var(--font-mono); font-size: 12px;
            color: var(--text-cloud); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 20px;
        }

        .flex-sim-control-box {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Circular Range Tracker Graphics */
        .radial-progress-shell {
            position: relative;
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }

        .radial-svg { width: 100px; height: 100px; transform: rotate(-90deg); position: absolute; }
        .radial-svg circle {
            width: 100px; height: 100px;
            fill: none; stroke-width: 6;
            stroke-linecap: round;
        }
        .circle-bg { stroke: rgba(255,255,255,0.03); }
        .circle-fill {
            stroke: var(--hyper-cyan);
            stroke-dasharray: 251.2;
            stroke-dashoffset: 188.4; /* Dynamic */
            transition: stroke-dashoffset 0.1s, stroke 0.3s;
        }

        .radial-value-text {
            font-family: var(--font-mono);
            font-size: 13px; color: white; font-weight: 700;
        }

        body.breach-emergency .circle-fill { stroke: var(--hyper-pink); }

        .slider-axis-panel { flex-grow: 1; }

        .fluid-range-slider {
            -webkit-appearance: none;
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.05); outline: none;
            border-radius: 10px;
        }
        .fluid-range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            background: white; cursor: pointer; border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

        .shield-status-ribbon {
            margin-top: 20px; padding: 14px 18px;
            font-size: 13px; font-weight: 600;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-glow);
            color: var(--text-cloud); border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
        }
        .shield-status-ribbon.triggered {
            border-color: rgba(255, 0, 127, 0.4);
            color: white; background: rgba(255, 0, 127, 0.04);
            box-shadow: 0 0 20px rgba(255,0,127,0.05);
        }

        .zero-state-logs {
            text-align: center; color: var(--text-cloud);
            font-family: var(--font-mono); font-size: 15px;
            grid-column: 1 / -1; padding: 100px 0;
            text-transform: uppercase; letter-spacing: 2px;
        }
        
        input[type="checkbox"] {
            accent-color: var(--hyper-cyan);
            width: 18px; height: 18px;
        }
    </style>
</head>
<body>

    <div class="plasma-vignette"></div>
    <div class="aurora-layer" id="aurora-1"></div>
    <div class="aurora-layer" id="aurora-2"></div>

    <div class="wrapper">
        <header class="aether-header">
            <h1>Aether Node Engine</h1>
            <div class="meta-stamp-row">
                <div class="quantum-pulse-dot"></div>
                <span class="live-chronograph" id="systemClock">CONNECTING DECK...</span>
            </div>
            
            <div class="action-cluster-deck">
                <div class="search-nebula">
                    <i class="fas fa-magnifying-glass"></i>
                    <input type="text" id="nebulaQueryInput" placeholder="Scan records or match metadata channels...">
                </div>
                <button class="btn-fluid" onclick="openInjectionModal()">
                    <i class="fas fa-plus"></i> Inject Node
                </button>
            </div>
        </header>

        <div class="glass-ribbon" id="categoryRibbonTrack"></div>

        <div class="matrix-grid" id="masterMatrixGrid"></div>
        <div class="zero-state-logs" id="zeroNotice" style="display:none;">Data Scan Complete // Zero matching records in current channel</div>
    </div>

    <div class="glass-overlay" id="recordConfigModal">
        <div class="glass-modal-vault">
            <div class="modal-head-row">
                <h2 id="configModalLabel">New Node Schema</h2>
                <button class="modal-close-trigger" onclick="closeInjectionModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="schemaStructureForm" onsubmit="commitNodePayload(event)">
                <input type="hidden" id="nodePayloadId">
                
                <div class="input-block-node">
                    <label>Title Vector Identifier</label>
                    <input type="text" id="formTitleField" required placeholder="Assign record title descriptive parameter...">
                </div>

                <div class="input-block-node">
                    <label>Topic Core Icon Matrix</label>
                    <select id="formEmojiField">
                        <option value="💡">General Core 💡</option>
                        <option value="🎁">Promotional Matrix 🎁</option>
                        <option value="⚽">Athletics Terminal ⚽</option>
                        <option value="🎰">Casino Core Terminal 🎰</option>
                        <option value="🎟️">Lottery Vector 🎟️</option>
                        <option value="💳">Deposit Vault Interface 💳</option>
                        <option value="💰">Payout Ledger Target 💰</option>
                    </select>
                </div>
                
                <div class="input-block-node">
                    <label>Payload Log Summary</label>
                    <textarea id="formDescField" required placeholder="Log operational instructions..." style="height: 120px; resize: vertical;"></textarea>
                </div>
                
                <div class="input-block-node">
                    <label>Vector Route Channels (Select multiple)</label>
                    <div class="checkbox-flex-matrix" id="formCheckboxCluster"></div>
                </div>

                <div class="modal-action-footer">
                    <button type="button" class="btn-core dismiss" onclick="closeInjectionModal()">Abort</button>
                    <button type="submit" class="btn-core save-execute">Deploy Payload</button>
                </div>
            </form>
        </div>
    </div>

    <div class="glass-overlay" id="quantumReaderModal">
        <div class="glass-modal-vault" style="max-width: 620px; background: rgba(6, 10, 23, 0.82);" id="readerGlassFrame">
            <div class="modal-head-row" style="margin-bottom: 15px;">
                <div style="font-family: var(--font-mono); font-size: 12px; color: var(--hyper-cyan); letter-spacing: 1px;" id="readerRegistryId">LOG // ANALYZING</div>
                <button class="modal-close-trigger" onclick="closeQuantumReader()"><i class="fas fa-times"></i></button>
            </div>
            
            <div style="font-size: 4.2rem; margin-bottom: 20px; line-height:1;" id="readerIconDisplay">💡</div>
            <h3 style="font-family: 'Outfit', sans-serif; font-size: 2.1rem; font-weight: 900; margin: 0 0 20px 0; letter-spacing: -0.5px; line-height: 1.25;" id="readerTitleDisplay">Title Parameter</h3>
            
            <div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04); padding: 25px; border-radius: 20px; font-size: 15.5px; line-height: 1.75; color: #cbd5e1; margin-bottom: 30px; white-space: pre-wrap;" id="readerDescDisplay">Logs...</div>
            
            <div class="hologram-simulator-module" id="circleSimulatorBlock">
                <div class="sim-header-row">
                    <span>Balance Liquidity Scanner</span>
                    <span>Cap: $150.00</span>
                </div>
                <div class="flex-sim-control-box">
                    <div class="radial-progress-shell">
                        <svg class="radial-svg">
                            <circle class="circle-bg" cx="50" cy="50" r="40"></circle>
                            <circle class="circle-fill" id="circularFillMetric" cx="50" cy="50" r="40"></circle>
                        </svg>
                        <div class="radial-value-text" id="radialNumericValue">$75.00</div>
                    </div>
                    <div class="slider-axis-panel">
                        <input type="range" min="0" max="300" value="75" class="fluid-range-slider" id="radialQuantumSlider">
                    </div>
                </div>
                <div class="shield-status-ribbon" id="shieldRibbonTrack">
                    <i class="fas fa-shield-halved"></i> <span id="shieldRibbonText">ID CHECK // NOT MANDATED</span>
                </div>
            </div>

            <label style="display:block; font-family:var(--font-mono); font-size:12px; color:var(--text-cloud); margin-bottom:12px; text-transform:uppercase;">Network Node Routing Mapping</label>
            <div class="tag-row-box" id="readerTagsTrack" style="border-top:none; padding-top:0;"></div>
            
            <div class="modal-action-footer">
                <button type="button" class="btn-core save-execute" style="width:100%; text-align:center; display:block;" onclick="closeQuantumReader()">Dismiss Terminal Stream</button>
            </div>
        </div>
    </div>

    <script>
        // Set Up Live Holographic Clock Logs
        const runtimeClockOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('systemClock').innerText = `AETHER ACTIVE // HUB-STREAM // ${new Date().toLocaleDateString('en-US', runtimeClockOptions).toUpperCase()}`;

        // Baseline Invariant Structural Seed Logs
        const coreSeedCollection = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals. This streamlines processing times significantly for all regional requests.", categories: ["Payouts", "General Info"], emoji: "💰", reactions: { "👍": 24, "🔥": 8, "📌": 5, "👀": 19 } },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more. Make sure the documentation matches perfectly.", categories: ["General Info"], emoji: "💡", reactions: { "👍": 7, "🔥": 2, "📌": 42, "👀": 91 } },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"], emoji: "🎁", reactions: { "👍": 31, "🔥": 56, "📌": 8, "👀": 23 } }
        ];

        let reminders = JSON.parse(localStorage.getItem('aether_neural_reminders')) || coreSeedCollection;

        const networkCategories = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        let targetedCategoryChannel = "All";
        let localFilterQueryString = "";

        const matrixGrid = document.getElementById('masterMatrixGrid');
        const ribbonTrack = document.getElementById('categoryRibbonTrack');
        const searchNebulaBox = document.getElementById('nebulaQueryInput');
        const configModal = document.getElementById('recordConfigModal');
        const quantumReader = document.getElementById('quantumReaderModal');
        const zeroNotice = document.getElementById('zeroNotice');

        // Circular Simulation Submodule Controls Map
        const radSlider = document.getElementById('radialQuantumSlider');
        const radNumValue = document.getElementById('radialNumericValue');
        const radCircleFill = document.getElementById('circularFillMetric');
        const radShieldTrack = document.getElementById('shieldRibbonTrack');
        const radShieldText = document.getElementById('shieldRibbonText');
        const readerGlassFrame = document.getElementById('readerGlassFrame');

        function ignitionSequence() {
            generateRibbonCells();
            generateFormCheckboxes();
            pipelineSynchronizeGrid();
            mountSimulatorEngine();
        }

        function generateRibbonCells() {
            ribbonTrack.innerHTML = '';
            ["All", ...networkCategories].forEach(cat => {
                const cell = document.createElement('button');
                cell.className = `ribbon-cell ${cat === targetedCategoryChannel ? 'active' : ''}`;
                cell.textContent = cat;
                cell.onclick = () => {
                    targetedCategoryChannel = cat;
                    generateRibbonCells();
                    pipelineSynchronizeGrid();
                };
                ribbonTrack.appendChild(cell);
            });
        }

        function generateFormCheckboxes() {
            const wrapperBox = document.getElementById('formCheckboxCluster');
            wrapperBox.innerHTML = '';
            networkCategories.forEach(cat => {
                wrapperBox.innerHTML += `
                    <label class="cb-organic-label">
                        <input type="checkbox" value="${cat}" class="payload-cb-node"> ${cat}
                    </label>
                `;
            });
        }

        function extractThemeClassMap(emoji) {
            if (emoji === '⚽') return 'theme-sports';
            if (emoji === '🎰' || emoji === '🎟️') return 'theme-casino';
            if (emoji === '💰') return 'theme-money';
            if (emoji === '💳' || emoji === '💡') return 'theme-general';
            if (emoji === '🎁') return 'theme-bonus';
            return '';
        }

        function pipelineSynchronizeGrid() {
            matrixGrid.innerHTML = '';
            let operationalStack = reminders;

            if (targetedCategoryChannel !== "All") {
                operationalStack = operationalStack.filter(r => r.categories.includes(targetedCategoryChannel));
            }

            if (localFilterQueryString.trim() !== "") {
                const matchingLower = localFilterQueryString.toLowerCase();
                operationalStack = operationalStack.filter(r => 
                    r.title.toLowerCase().includes(matchingLower) || 
                    r.description.toLowerCase().includes(matchingLower)
                );
            }

            if (operationalStack.length === 0) {
                zeroNotice.style.display = 'block';
                return;
            }
            zeroNotice.style.display = 'none';

            [...operationalStack].reverse().forEach((record, revIdx) => {
                const cardNode = document.createElement('div');
                const specificTheme = extractThemeClassMap(record.emoji);
                cardNode.className = `quantum-card ${specificTheme}`;
                
                cardNode.onclick = (e) => {
                    if (!e.target.closest('.card-ambient-node') && !e.target.closest('.reaction-row')) {
                        openQuantumReaderPanel(record.id);
                    }
                };

                const internalReacts = record.reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                const tagsListHtml = record.categories.map(c => `<span class="tag-pill-node">${c}</span>`).join('');
                
                const activeR1 = localStorage.getItem(`aether_react_${record.id}_👍`) ? 'active-state' : '';
                const activeR2 = localStorage.getItem(`aether_react_${record.id}_🔥`) ? 'active-state' : '';
                const activeR3 = localStorage.getItem(`aether_react_${record.id}_📌`) ? 'active-state' : '';
                const activeR4 = localStorage.getItem(`aether_react_${record.id}_👀`) ? 'active-state' : '';

                cardNode.innerHTML = `
                    <div class="card-ambient-node">
                        <button class="card-utility-btn" onclick="editPayloadConfig(${record.id}); event.stopPropagation();" title="Adjust Parameters"><i class="fas fa-sliders-h"></i></button>
                        <button class="card-utility-btn danger-wipe" onclick="wipeOperationalNode(${record.id}); event.stopPropagation();" title="Purge Record"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <div class="card-icon-hub">${record.emoji || '💡'}</div>
                    <h3>${record.title}</h3>
                    <p>${record.description}</p>
                    
                    <div class="reaction-row">
                        <button class="pill-trigger ${activeR1}" onclick="triggerAtomicReaction(${record.id}, '👍'); event.stopPropagation();">
                            <span>👍</span> <span>${internalReacts['👍'] || 0}</span>
                        </button>
                        <button class="pill-trigger ${activeR2}" onclick="triggerAtomicReaction(${record.id}, '🔥'); event.stopPropagation();">
                            <span>🔥</span> <span>${internalReacts['🔥'] || 0}</span>
                        </button>
                        <button class="pill-trigger ${activeR3}" onclick="triggerAtomicReaction(${record.id}, '📌'); event.stopPropagation();">
                            <span>📌</span> <span>${internalReacts['📌'] || 0}</span>
                        </button>
                        <button class="pill-trigger ${activeR4}" onclick="triggerAtomicReaction(${record.id}, '👀'); event.stopPropagation();">
                            <span>👀</span> <span>${internalReacts['👀'] || 0}</span>
                        </button>
                    </div>
                    <div class="tag-row-box">${tagsListHtml}</div>
                `;
                matrixGrid.appendChild(cardNode);
            });
        }

        function triggerAtomicReaction(id, emojiKey) {
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                if (!reminders[index].reactions) {
                    reminders[index].reactions = { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                }

                const reactionStateKey = `aether_react_${id}_${emojiKey}`;
                if (localStorage.getItem(reactionStateKey)) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(reactionStateKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(reactionStateKey, 'true');
                }

                saveAetherStateToVault();
                pipelineSynchronizeGrid();
            }
        }

        searchNebulaBox.addEventListener('input', (e) => {
            localFilterQueryString = e.target.value;
            pipelineSynchronizeGrid();
        });

        function openInjectionModal() {
            document.getElementById('schemaStructureForm').reset();
            document.getElementById('nodePayloadId').value = '';
            document.getElementById('formEmojiField').value = '💡';
            document.getElementById('configModalLabel').innerText = "Configure Record Node";
            document.querySelectorAll('.payload-cb-node').forEach(cb => cb.checked = false);
            configModal.classList.add('active');
        }

        function closeInjectionModal() { configModal.classList.remove('active'); }

        function openQuantumReaderPanel(id) {
            const node = reminders.find(r => r.id === id);
            if (node) {
                document.getElementById('readerIconDisplay').innerText = node.emoji || '💡';
                document.getElementById('readerTitleDisplay').innerText = node.title;
                document.getElementById('readerDescDisplay').innerText = node.description;
                document.getElementById('readerRegistryId').innerText = `METADATA // CORE-STREAM-${node.id}`;
                
                const tagsTrack = document.getElementById('readerTagsTrack');
                tagsTrack.innerHTML = node.categories.map(c => `<span class="tag-pill-node" style="background:rgba(255,255,255,0.05); font-size:12px; padding:6px 14px; border:1px solid var(--border-glow);">${c}</span>`).join('');
                
                // Mount high-end circle simulation strictly for Information Change Protocol rules matching
                const circleSimBox = document.getElementById('circleSimulatorBlock');
                if (id === 2 || node.title.toLowerCase().includes("information change")) {
                    circleSimBox.style.display = 'block';
                    calculateRadialMetrics(radSlider.value);
                } else {
                    circleSimBox.style.display = 'none';
                    document.body.classList.remove('breach-emergency');
                    readerGlassFrame.style.borderColor = 'var(--border-glow)';
                }

                quantumReader.classList.add('active');
            }
        }

        function closeQuantumReader() {
            quantumReader.classList.remove('active');
            document.body.classList.remove('breach-emergency');
        }

        function mountSimulatorEngine() {
            radSlider.addEventListener('input', (e) => {
                calculateRadialMetrics(e.target.value);
            });
        }

        function calculateRadialMetrics(val) {
            radNumValue.innerText = `$${parseFloat(val).toFixed(2)}`;
            
            // Calculate dynamic circular SVG dash offsets (Radius is 40, circumference is 2 * pi * 40 ≈ 251.2)
            const maximumValue = 300;
            const percentageUsed = Math.min(val / maximumValue, 1);
            const rawStrokeOffset = 251.2 - (percentageUsed * 251.2);
            radCircleFill.style.strokeDashoffset = rawStrokeOffset;

            if (val >= 150) {
                radShieldTrack.classList.add('triggered');
                radShieldText.innerText = "PROTOCOL CRITICAL: ID DOCUMENTATION MANDATED";
                document.body.classList.add('breach-emergency');
                readerGlassFrame.style.borderColor = 'var(--hyper-pink)';
            } else {
                radShieldTrack.classList.remove('triggered');
                radShieldText.innerText = "CLEARANCE VALIDATED: ID NOT REQUIRED";
                document.body.classList.remove('breach-emergency');
                readerGlassFrame.style.borderColor = 'var(--border-glow)';
            }
        }

        function editPayloadConfig(id) {
            const record = reminders.find(r => r.id === id);
            if (record) {
                document.getElementById('nodePayloadId').value = record.id;
                document.getElementById('formTitleField').value = record.title;
                document.getElementById('formDescField').value = record.description;
                document.getElementById('formEmojiField').value = record.emoji || '💡';
                document.getElementById('configModalLabel').innerText = "Adjust Record Matrix Schema";
                
                document.querySelectorAll('.payload-cb-node').forEach(cb => {
                    cb.checked = record.categories.includes(cb.value);
                });
                configModal.classList.add('active');
            }
        }

        function wipeOperationalNode(id) {
            if (confirm("Permanently drop and shred this record stream from local database state?")) {
                reminders = reminders.filter(r => r.id !== id);
                ['👍', '🔥', '📌', '👀'].forEach(k => localStorage.removeItem(`aether_react_${id}_${k}`));
                saveAetherStateToVault();
                pipelineSynchronizeGrid();
            }
        }

        function commitNodePayload(event) {
            event.preventDefault();
            const id = document.getElementById('nodePayloadId').value;
            const title = document.getElementById('formTitleField').value;
            const description = document.getElementById('formDescField').value;
            const emoji = document.getElementById('formEmojiField').value;
            
            const checksList = document.querySelectorAll('.payload-cb-node:checked');
            const targetCategories = Array.from(checksList).map(cb => cb.value);

            if (targetCategories.length === 0) {
                alert("Routing Allocation Failure: Link this record structure to at least one dynamic channel category.");
                return;
            }

            if (id) {
                const idx = reminders.findIndex(r => r.id == id);
                const historicReacts = reminders[idx].reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                reminders[idx] = { id: parseInt(id), title, description, categories: targetCategories, emoji, reactions: historicReacts };
            } else {
                reminders.push({ 
                    id: Date.now(), title, description, categories: targetCategories, emoji, 
                    reactions: { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 } 
                });
            }

            saveAetherStateToVault();
            closeInjectionModal();
            pipelineSynchronizeGrid();
        }

        function saveAetherStateToVault() {
            localStorage.setItem('aether_neural_reminders', JSON.stringify(reminders));
        }

        // Fire Engine Core Initialization
        ignitionSequence();
    </script>
</body>
</html>
