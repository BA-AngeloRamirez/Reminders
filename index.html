<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Reminders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1b2230; /* Punto medio ideal: azul pizarra oscuro, integrado y moderno */
            --card-bg: #111622; /* Tarjetas más oscuras para lograr un contraste perfecto */
            --panel-bg: #171e2e; 
            --accent-pink: #c91866;
            --accent-purple: #4e1a70;
            --accent-green: #b7f6a3;
            --accent-yellow: #fdf294;
            --text-white: #ffffff;
            --text-muted: #9ab0d1;
            --tab-bg: #111622;
            --header-bg: #111622;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Modern Header */
        .header {
            margin-bottom: 35px;
            padding: 35px;
            background: linear-gradient(135deg, #151b29 0%, #0d121c 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: var(--text-white);
            font-size: 3.2em;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .header .subtitle {
            color: #9d72ff;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .search-container {
            flex-grow: 1;
            position: relative;
            max-width: 600px;
        }

        .search-container input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background-color: #111622;
            color: #ffffff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .search-container input::placeholder {
            color: #5c6f8f;
            font-weight: 400;
        }

        .search-container input:focus {
            background-color: #171e2e;
            border-color: #8952ff;
            box-shadow: 0 0 12px rgba(137, 82, 255, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #5c6f8f;
            font-size: 1.1em;
        }

        .btn-add {
            background: linear-gradient(90deg, #8952ff, #a124db);
            color: #ffffff;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(161, 36, 219, 0.4);
        }

        /* Tab Navigation */
        .categories {
            display: flex;
            justify-content: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 35px;
            padding-bottom: 5px;
        }

        .category-btn {
            background-color: var(--tab-bg);
            color: #7e91b0;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .category-btn:hover {
            background-color: #171e2e;
            color: var(--text-white);
        }

        .category-btn.active {
            background: linear-gradient(90deg, var(--accent-pink) 0%, var(--accent-purple) 100%);
            color: var(--text-white);
            border-color: transparent;
            box-shadow: 0 5px 15px rgba(201, 24, 102, 0.3);
        }

        /* Reminders Grid */
        .reminders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .reminder-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .reminder-card:hover {
            transform: translateY(-6px);
            border-color: rgba(137, 82, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* Card Visual Header Box */
        .card-visual-box {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg-gradient-1 { background: linear-gradient(135deg, #09472a 0%, #061f14 100%); }
        .bg-gradient-2 { background: linear-gradient(135deg, #2a1140 0%, #150821 100%); }
        .bg-gradient-3 { background: linear-gradient(135deg, #5c3c06 0%, #291a02 100%); }
        .bg-gradient-4 { background: linear-gradient(135deg, #182a47 0%, #0b1424 100%); }
        .bg-gradient-5 { background: linear-gradient(135deg, #52112a 0%, #260713 100%); }

        .card-visual-box .big-emoji {
            font-size: 3.2em;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }

        .card-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 5;
        }

        .icon-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            color: #abbccd;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
        }

        .icon-btn:hover {
            background: var(--text-white);
            color: #111622;
        }

        .icon-btn.delete-btn:hover {
            background: #e63946;
            color: white;
            border-color: #e63946;
        }

        .card-body {
            padding: 22px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-body h3 {
            color: var(--text-white);
            margin: 0 0 10px 0;
            font-size: 1.25em;
            font-weight: 700;
            line-height: 1.3;
        }

        .card-body p {
            margin: 0 0 20px 0;
            line-height: 1.5;
            color: var(--text-muted);
            font-size: 14px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reactions-container {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            position: relative;
            z-index: 5;
        }

        .reaction-pill-btn {
            background: #171e2e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #8da2c4;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .reaction-pill-btn:hover {
            background: #202b42;
            color: var(--text-white);
        }

        .reaction-pill-btn.has-count {
            background: rgba(137, 82, 255, 0.15);
            border-color: #8952ff;
            color: #b394ff;
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #171e2e;
            color: #728fb8;
            padding: 5px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        /* Modals Setup Base */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 23, 0.85); 
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--panel-bg);
            width: 95%;
            max-width: 520px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
            color: var(--text-white);
        }

        .close-modal {
            background: none;
            border: none;
            color: #6b82a6;
            font-size: 1.4em;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #8da2c4;
        }

        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #111622;
            color: white;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        .form-group select option {
            background: var(--panel-bg);
            color: white;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #8952ff;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #abbccd;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-cancel {
            background: #111622;
            color: #abbccd;
            border: none;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-save {
            background: #8952ff;
            color: white;
            border: none;
            padding: 11px 26px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
        }

        /* View Post Reader Modal Styles Solved for image_6dd080.png */
        .view-emoji-container {
            font-size: 3.5em;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .view-title {
            font-size: 1.6em;
            font-weight: 700;
            color: var(--text-white);
            text-align: center;
            margin: 0 0 15px 0;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .view-desc {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            background: #111622;
            padding: 22px;
            border-radius: 12px;
            max-height: 350px;
            overflow-y: auto;
            overflow-x: hidden;
            margin-bottom: 20px;
            white-space: pre-wrap; 
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .view-tags-label {
            font-size: 12px;
            font-weight: 700;
            color: #6b82a6;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .no-results {
            text-align: center;
            color: #6b82a6;
            font-size: 1.1em;
            margin-top: 40px;
            grid-column: 1 / -1;
            display: none;
        }
        
        input[type="checkbox"] {
            accent-color: #8952ff;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>BA Reminders</h1>
            <div class="subtitle" id="currentDate"></div>
            
            <div class="controls-wrapper">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search keywords (e.g. Bonus, Bank Wire)...">
                </div>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> New Post
                </button>
            </div>
        </div>

        <div class="categories" id="categoriesContainer">
            </div>

        <div class="reminders-grid" id="remindersGrid">
            </div>
        <div class="no-results" id="noResults">Oops!<br>No reminders found.</div>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Post</h2>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="postForm" onsubmit="savePost(event)">
                <input type="hidden" id="postId">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="postTitleInput" required placeholder="Enter reminder title...">
                </div>

                <div class="form-group">
                    <label>Assign Icon / Topic</label>
                    <select id="postEmojiInput">
                        <option value="💡">General Info 💡</option>
                        <option value="🎁">Bonuses / Promos 🎁</option>
                        <option value="⚽">Sports / Sportsbooks ⚽</option>
                        <option value="🎰">Casino 🎰</option>
                        <option value="🎟️">Lotto 🎟️</option>
                        <option value="💳">Deposits 💳</option>
                        <option value="💰">Money / Payouts 💰</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Information</label>
                    <textarea id="postDescInput" required placeholder="Enter the details..." style="height: 120px; resize: vertical;"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Categories (Select at least one)</label>
                    <div class="categories-grid" id="checkboxesContainer">
                        </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="viewPostModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reminder Details</h2>
                <button class="close-modal" onclick="closeViewModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="view-emoji-container" id="viewPostEmoji">💡</div>
            <h3 class="view-title" id="viewPostTitle">Title Placeholder</h3>
            <div class="view-desc" id="viewPostDesc">Full description details go here...</div>
            
            <span class="view-tags-label">Assigned Categories</span>
            <div class="tags" id="viewPostTags"></div>
            
            <div class="modal-actions">
                <button type="button" class="btn-save" style="background: #6a3aff;" onclick="closeViewModal()">Close View</button>
            </div>
        </div>
    </div>

    <script>
        // Date Setup
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', dateOptions);

        // Baseline Mock Data
        const defaultReminders = [
            { id: 1, title: "Bank Wire Verification Update", description: "ID and Utility Bill are no longer required for Bank Wire withdrawals. This streamlines processing times significantly for all regional requests.", categories: ["Payouts", "General Info"], emoji: "💰", reactions: { "👍": 2, "🔥": 1, "📌": 0, "👀": 0 } },
            { id: 2, title: "Information Change Protocol", description: "An ID is required only for email address changes when the available balance is $150 or more. Make sure the documentation matches perfectly.", categories: ["General Info"], emoji: "💡", reactions: { "👍": 0, "🔥": 0, "📌": 3, "👀": 1 } },
            { id: 3, title: "Bonus Request Exception Update", description: "No exception is needed for bonus requests when the qualifying deposit was made between 24 and 48 hours ago.", categories: ["Bonuses", "Deposits"], emoji: "🎁", reactions: { "👍": 1, "🔥": 4, "📌": 0, "👀": 2 } }
        ];

        let reminders = JSON.parse(localStorage.getItem('ba_reminders')) || defaultReminders;

        const catOptions = ["Deposits", "Payouts", "General Info", "Bonuses", "Sports", "Casino", "Lotto"];
        const allCategoriesTab = ["All", ...catOptions];
        let currentCategory = "All";
        let searchTerm = "";

        const grid = document.getElementById('remindersGrid');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const modal = document.getElementById('postModal');
        const viewModal = document.getElementById('viewPostModal');

        function init() {
            renderTabs();
            renderCheckboxes();
            renderReminders();
        }

        function renderTabs() {
            categoriesContainer.innerHTML = '';
            allCategoriesTab.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat === currentCategory ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    renderTabs();
                    renderReminders();
                };
                categoriesContainer.appendChild(btn);
            });
        }

        function renderCheckboxes() {
            const container = document.getElementById('checkboxesContainer');
            container.innerHTML = '';
            catOptions.forEach(cat => {
                container.innerHTML += `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${cat}" class="cat-checkbox"> ${cat}
                    </label>
                `;
            });
        }

        function getGradientClass(emoji) {
            if (emoji === '⚽') return 'bg-gradient-1';
            if (emoji === '🎰' || emoji === '🎟️') return 'bg-gradient-2';
            if (emoji === '💰') return 'bg-gradient-3';
            if (emoji === '💳' || emoji === '💡') return 'bg-gradient-4';
            if (emoji === '🎁') return 'bg-gradient-5';
            return 'bg-gradient-4';
        }

        function renderReminders() {
            grid.innerHTML = '';
            let filtered = reminders;

            if (currentCategory !== "All") {
                filtered = filtered.filter(item => item.categories.includes(currentCategory));
            }

            if (searchTerm.trim() !== "") {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(term) || 
                    item.description.toLowerCase().includes(term)
                );
            }

            if (filtered.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                [...filtered].reverse().forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'reminder-card';
                    
                    card.onclick = (e) => {
                        if (!e.target.closest('.card-actions') && !e.target.closest('.reactions-container')) {
                            openViewModal(item.id);
                        }
                    };
                    
                    const tagsHtml = item.categories.map(cat => `<span class="tag">${cat}</span>`).join('');
                    const postReactions = item.reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                    const itemEmoji = item.emoji || "💡";
                    const gradientClass = getGradientClass(itemEmoji);

                    const userReacted1 = localStorage.getItem(`reacted_${item.id}_👍`) ? 'has-count' : '';
                    const userReacted2 = localStorage.getItem(`reacted_${item.id}_🔥`) ? 'has-count' : '';
                    const userReacted3 = localStorage.getItem(`reacted_${item.id}_📌`) ? 'has-count' : '';
                    const userReacted4 = localStorage.getItem(`reacted_${item.id}_👀`) ? 'has-count' : '';

                    card.innerHTML = `
                        <div class="card-visual-box ${gradientClass}">
                            <div class="card-actions">
                                <button class="icon-btn" onclick="editPost(${item.id}); event.stopPropagation();" title="Edit Post"><i class="fas fa-pen"></i></button>
                                <button class="icon-btn delete-btn" onclick="deletePost(${item.id}); event.stopPropagation();" title="Delete Post"><i class="fas fa-trash"></i></button>
                            </div>
                            <div class="big-emoji">${itemEmoji}</div>
                        </div>
                        <div class="card-body">
                            <h3>${item.title}</h3>
                            <p>${item.description}</p>
                            
                            <div class="reactions-container">
                                <button class="reaction-pill-btn ${userReacted1}" onclick="addReaction(${item.id}, '👍'); event.stopPropagation();">
                                    <span>👍</span> <span class="rc-count">${postReactions['👍'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted2}" onclick="addReaction(${item.id}, '🔥'); event.stopPropagation();">
                                    <span>🔥</span> <span class="rc-count">${postReactions['🔥'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted3}" onclick="addReaction(${item.id}, '📌'); event.stopPropagation();">
                                    <span>📌</span> <span class="rc-count">${postReactions['📌'] || 0}</span>
                                </button>
                                <button class="reaction-pill-btn ${userReacted4}" onclick="addReaction(${item.id}, '👀'); event.stopPropagation();">
                                    <span>👀</span> <span class="rc-count">${postReactions['👀'] || 0}</span>
                                </button>
                            </div>

                            <div class="tags">${tagsHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function addReaction(id, emojiKey) {
            const index = reminders.findIndex(r => r.id === id);
            if (index !== -1) {
                if (!reminders[index].reactions) {
                    reminders[index].reactions = { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                }
                
                const trackingKey = `reacted_${id}_${emojiKey}`;
                const userAlreadyReacted = localStorage.getItem(trackingKey);

                if (userAlreadyReacted) {
                    reminders[index].reactions[emojiKey] = Math.max(0, (reminders[index].reactions[emojiKey] || 1) - 1);
                    localStorage.removeItem(trackingKey);
                } else {
                    reminders[index].reactions[emojiKey] = (reminders[index].reactions[emojiKey] || 0) + 1;
                    localStorage.setItem(trackingKey, 'true');
                }
                
                saveData();
                renderReminders();
            }
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderReminders();
        });

        function openModal() {
            document.getElementById('postForm').reset();
            document.getElementById('postId').value = '';
            document.getElementById('postEmojiInput').value = '💡';
            document.getElementById('modalTitle').innerText = "Create New Post";
            
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
            
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function openViewModal(id) {
            const post = reminders.find(r => r.id === id);
            if (post) {
                document.getElementById('viewPostEmoji').innerText = post.emoji || '💡';
                document.getElementById('viewPostTitle').innerText = post.title;
                document.getElementById('viewPostDesc').innerText = post.description;
                
                const tagsContainer = document.getElementById('viewPostTags');
                tagsContainer.innerHTML = post.categories.map(cat => `<span class="tag">${cat}</span>`).join('');
                
                viewModal.classList.add('active');
            }
        }

        function closeViewModal() {
            viewModal.classList.remove('active');
        }

        function editPost(id) {
            const post = reminders.find(r => r.id === id);
            if(post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postTitleInput').value = post.title;
                document.getElementById('postDescInput').value = post.description;
                document.getElementById('postEmojiInput').value = post.emoji || '💡';
                document.getElementById('modalTitle').innerText = "Edit Post";
                
                const checkboxes = document.querySelectorAll('.cat-checkbox');
                checkboxes.forEach(cb => {
                    cb.checked = post.categories.includes(cb.value);
                });
                modal.classList.add('active');
            }
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this reminder?")) {
                reminders = reminders.filter(r => r.id !== id);
                ['👍', '🔥', '📌', '👀'].forEach(k => localStorage.removeItem(`reacted_${id}_${k}`));
                saveData();
                renderReminders();
            }
        }

        function savePost(event) {
            event.preventDefault();
            const id = document.getElementById('postId').value;
            const title = document.getElementById('postTitleInput').value;
            const description = document.getElementById('postDescInput').value;
            const emoji = document.getElementById('postEmojiInput').value;
            
            const checkboxes = document.querySelectorAll('.cat-checkbox:checked');
            const selectedCategories = Array.from(checkboxes).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                alert("Please select at least one category.");
                return;
            }

            if (id) {
                const index = reminders.findIndex(r => r.id == id);
                const existingReactions = reminders[index].reactions || { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 };
                reminders[index] = { id: parseInt(id), title, description, categories: selectedCategories, emoji, reactions: existingReactions };
            } else {
                const newId = Date.now();
                reminders.push({ 
                    id: newId, 
                    title, 
                    description, 
                    categories: selectedCategories, 
                    emoji, 
                    reactions: { "👍": 0, "🔥": 0, "📌": 0, "👀": 0 } 
                });
            }

            saveData();
            closeModal();
            renderReminders();
        }

        function saveData() {
            localStorage.setItem('ba_reminders', JSON.stringify(reminders));
        }

        init();
    </script>
</body>
</html>
